## Conclusão: A Cabeça Esmagada e os Espíritos Subjugados

Chegamos ao fim do quarto volume com uma compreensão radicalmente ampliada da guerra cósmica. Os Nefilim — os híbridos nascidos da união proibida entre Vigilantes e mulheres — morreram no dilúvio, mas seus espíritos permaneceram. A revelação de 1 Enoque 15 se tornou a espinha dorsal da demonologia do Novo Testamento: os demônios são os espíritos dos gigantes mortos.

Isso explica tudo. Explica por que buscam corpos. Explica por que temem o abismo. Explica por que clamam a Jesus "antes do tempo". Explica por que a expulsão de demônios é o sinal do reino. Explica por que a confissão de que Jesus veio em carne é o teste definitivo dos espíritos.

Jesus enfrentou a Legião, e a Legião fugiu. Jesus enfrentou o espírito mudo, e o mudo falou. Jesus enfrentou a jovem de adivinhação, e ela foi liberta. Cada encontro era uma batalha cósmica em miniatura, e em cada batalha, o Filho do Homem prevaleceu. A serpente do Éden produziu semente; o Filho de Davi a subjugou.

Para o remanescente fiel, a aplicação é prática e imediata. A libertação faz parte da vida cristã normal. Não como espetáculo sensacionalista, mas como continuação do ministério de Cristo através de sua Igreja. O nome de Jesus, a autoridade delegada, o discernimento dos espíritos e a dependência do Espírito Santo são as armas com as quais travamos essa guerra.

Mas a vitória final ainda está por vir. Ainda há demônios operando. Ainda há Mastema com seus 10%. Ainda há legiões buscando corpos. No próximo volume, subiremos do indivíduo possesso para as nações possessas. Os Vigilantes caíram; os Nefilim geraram demônios; e agora, em Babel, os *sarim* — príncipes territoriais — assumiram o governo das setenta nações.

*"E estes sinais seguirão aos que crerem: Em meu nome expulsarão os demônios."* (Marcos 16:17)

