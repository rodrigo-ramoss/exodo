## Ponte para o Volume 5: Babel e os Príncipes Territoriais

No próximo volume, mudaremos de escala. Até agora, estudamos a guerra cósmica em nível pessoal e familiar: a queda do querubim, a rebelião dos Vigilantes, a origem dos demônios. Mas a terceira rebelião — narrada em Gênesis 10-11, Deuteronômio 32:8-9 e Daniel 10 — opera em nível **geopolítico**.

Quando Deus dispersou as nações em Babel, Ele as colocou sob a jurisdição de seres celestiais — os *sarim*, príncipes territoriais. E, como os Vigilantes antes deles, muitos desses príncipes se corromperam e se tornaram os "deuses" das nações pagãs. A idolatria não é adoração a pedras e madeira; é adoração a seres espirituais reais que estão por trás dos ídolos.

Vamos investigar Deuteronômio 32:8-9 na versão mais antiga preservada em Qumran, o Salmo 82 e sua visão do conselho divino corrompido, Daniel 10 e a batalha territorial com o príncipe da Pérsia, e Efésios 6 — onde Paulo revela que nossa luta não é contra carne e sangue, mas contra os *kosmokratoras*, os dominadores deste mundo tenebroso.

Prepare-se para a geopolítica do mundo espiritual.

