## Capítulo 3 — Mastema e os 10%: O Acordo de Jubileus 10

### 3.1 A Oração de Noé e a Petição dos Espíritos

Jubileus 10:1-9 registra um episódio que não aparece em Gênesis, mas que é fundamental para entender a demonologia do Segundo Templo e, por extensão, a do Novo Testamento. Após o dilúvio, os espíritos dos Nefilim mortos começaram a atacar os filhos de Noé:

*"E no terceiro jubileu deste jubileu, os espíritos imundos começaram a seduzir os filhos dos filhos de Noé, e a enganá-los e a destruí-los. E os filhos de Noé vieram a seu pai e contaram-lhe sobre os espíritos que estavam seduzindo, cegando e matando seus filhos. E Noé orou perante o Senhor..."* (Jubileus 10:1-4)

A cena é comovente: Noé, o sobrevivente do dilúvio, vê seus netos sendo atacados pelas mesmas forças que destruíram a geração anterior. Os espíritos dos Nefilim, que morreram nas águas, agora perseguem a única linhagem humana pura remanescente.

A oração de Noé é poderosa: ele pede que Deus amarre os espíritos no "lugar de juízo" e os remova da terra. Sua petição é uma intervenção profética — o patriarca cumpre o papel de intercessor que o próprio Enoque havia cumprido (1 Enoque 13 pedindo pelos Vigilantes; agora Noé pede contra seus descendentes espirituais).

### 3.2 O Aprisionamento de 90% e a Liberação Controlada dos Restantes

A resposta divina em Jubileus 10 é uma das demonstrações mais impressionantes da soberania de Deus sobre as forças do mal:

*"E o Senhor nosso Deus ordenou-nos [aos anjos] que amarrássemos todos. E o chefe dos espíritos, Mastema, veio e disse: 'Senhor Criador, deixa alguns deles diante de mim, e que eles ouçam a minha voz e façam tudo o que eu lhes disser; porque se alguns deles não ficarem para mim, não poderei executar o poder da minha vontade sobre os filhos dos homens.'"* (Jubileus 10:7-8)

**Mastema** (משטמה — "hostilidade, inimizade") aparece aqui como o líder dos espíritos imundos. É outro nome para o mesmo adversário que já estudamos (cf. Códice Cosmológico § 08). O nome expressa sua função: é a personificação da inimizade entre a semente da serpente e a semente da mulher (Gn 3:15 usa a mesma raiz hebraica *eivah*, "inimizade").

O pedido de Mastema é revelador: ele **precisa** de um contingente de espíritos para executar sua vontade. Sem eles, sua agência no mundo fica limitada. Isso confirma que o querubim caído não é onipresente nem onipotente; opera através de subordinados, assim como Deus opera através de seus anjos.

A decisão divina é precisa:

*"E Ele disse: 'A décima parte deles permanecerá diante dele, e nove partes descerão ao lugar de juízo.'"* (Jubileus 10:9)

Dez por cento são permitidos a permanecer sob o comando de Mastema. Noventa por cento são amarrados no lugar de juízo. A matemática é exata, a permissão é regulada, e o propósito é duplo: **testar e corromper a humanidade antes do juízo final** (cf. 1QS 3-4, a Doutrina dos Dois Espíritos).

A **Regra 5 de Hilel** (*klal u-phrat*) opera aqui com precisão: o princípio geral (*klal*) é que Deus governa soberanamente sobre todos os espíritos. O caso específico (*phrat*) de Jubileus 10 é uma manifestação concreta desse governo: uma porcentagem exata, um comandante nomeado, uma esfera de operação delimitada. O mal não está fora de controle; está sob permissão.

### 3.3 Tipologia Histórica: O Mal Sob Permissão Divina

O acordo de Jubileus 10 estabelece um padrão que se repete em toda a história da redenção: **o adversário e seus espíritos operam sob permissão divina, com limites precisos, e seu poder será retirado no tempo determinado**.

A **Tipologia 7 (Histórica)** nos permite traçar esse padrão:

- **Jó 1-2:** *Ha-Satan* recebe permissão para testar Jó, com limites progressivos (primeiro os bens, depois o corpo, nunca a vida).
- **1 Reis 22:** Um espírito recebe permissão para ser "espírito de mentira" na boca dos falsos profetas.
- **Zacarias 3:** O acusador é repreendido pelo Anjo do Senhor — a permissão de acusar é cassada.
- **Jubileus 10:** 90% dos espíritos são amarrados; 10% permanecem sob controle de Mastema.
- **Apocalipse 20:** Satanás é amarrado por mil anos. Depois, solto por um pouco de tempo, e finalmente lançado no lago de fogo.

A lógica é consistente: o mal opera sob **permissão regulada**. Não é uma força autônoma que rivaliza com Deus em pé de igualdade. É uma criatura caída cujo poder é progressivamente restringido até a remoção total.

Para o remanescente fiel, esta tem implicações práticas profundas. O demônio não pode fazer o que quer. Ele opera dentro de fronteiras estabelecidas por Deus. A oração, a resistência e a autoridade do nome de Jesus não negociam com o diabo; executam a sentença já decretada sobre ele. "Sujeitai-vos, pois, a Deus; resisti ao diabo, e ele fugirá de vós" (Tg 4:7). A fuga do diabo não é negociação; é obediência à ordem judicial divina que a resistência do crente aciona.

