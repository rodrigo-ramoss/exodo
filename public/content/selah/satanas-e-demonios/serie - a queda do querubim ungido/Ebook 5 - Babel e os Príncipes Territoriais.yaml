## Capítulo 1 — O Decreto de Deuteronômio 32:8-9

### 1.1 A Versão de Qumran e a Septuaginta

Deuteronômio 32:8-9 é um dos textos mais importantes e mais adulterados da Bíblia hebraica. O Cântico de Moisés é um poema arcaico, provavelmente o texto mais antigo do Pentateuco, e preserva uma teologia das nações que remonta ao segundo milênio a.C. Mas o texto hebraico que a maioria das Bíblias traduz — o Texto Massorético, padronizado entre os séculos VII e X d.C. — contém uma alteração.

O Texto Massorético de Deuteronômio 32:8 diz:

*"Quando o Altíssimo deu às nações a sua herança, quando separou os filhos dos homens, fixou os limites dos povos conforme o número dos **filhos de Israel** (bene Yisrael)."*

"Filhos de Israel" não faz sentido aqui. Israel ainda não existia como nação quando Deus separou as nações em Gênesis 10-11. O texto está falando de um evento **anterior** a Abraão — a dispersão de Babel. Além disso, a Septuaginta (tradução grega do século III a.C.) e os manuscritos de Deuteronômio encontrados em Qumran (4QDeut-j, do século I a.C.) trazem uma leitura diferente:

**"Conforme o número dos filhos de Deus"** (*bene Elohim* na Septuaginta; *bene Elim* em 4QDeut-j — ambos significando "seres celestiais").

A Septuaginta verte: *"fixou os limites das nações conforme o número dos **anjos de Deus**"* (angelōn Theou).

A diferença entre *Yisrael* e *Elim* no hebraico é de apenas uma letra: ישראל (Yisrael) versus אלים (Elim). A versão original, preservada em Qumran e na Septuaginta, é *Elim* — "deuses, seres celestiais". Em algum momento da transmissão rabínica, provavelmente no século II d.C. como reação ao uso cristão do texto, os escribas alteraram *Elim* para *Yisrael*.

**Por que essa alteração importa?** Porque Deuteronômio 32:8-9 descreve um decreto cósmico: quando Deus separou as nações em Babel, Ele as distribuiu entre os membros do seu conselho divino — os *bene Elohim* — para que os governassem em Seu nome. Apenas Israel foi retido como "porção do Senhor" diretamente governada por Yahweh.

Isso significa que, após Babel, cada nação ficou sob a jurisdição de um **sar** (príncipe celestial), um ser espiritual designado para supervisioná-la. Esses seres tornaram-se o que as nações chamavam de "deuses" — não o Deus Altíssimo, mas deuses subordinados que aceitaram a adoração que deveriam redirecionar a Yahweh.

### 1.2 Os Setenta Filhos de Deus e as Setenta Nações

A Tabela das Nações em Gênesis 10 lista precisamente **setenta nações** (ou grupos étnicos) descendentes de Noé. A Septuaginta conta setenta e duas, mas o número simbólico é o mesmo: a plenitude das nações.

Em paralelo, a tradição do Segundo Templo fala de **setenta filhos de Deus** — os membros do conselho divino aos quais as nações foram distribuídas. Jubileus 15:31-32 confirma:

*"Há muitas nações e muitos povos, e todos pertencem a Ele, mas sobre todos Ele estabeleceu espíritos em autoridade para desviá-los dele. Mas sobre Israel Ele não estabeleceu anjo nem espírito, porque somente Ele é o Governador deles."*

Jubileus é ainda mais explícito que Deuteronômio: os espíritos postos sobre as nações "os desviam" de Deus. A corrupção dos *sarim* não foi acidental; foi estrutural. Eles se tornaram concorrentes de Yahweh pela adoração das nações.

O número setenta não é aleatório. Setenta é o número da plenitude humana e da governança. Setenta anciãos de Israel (Êx 24:1). Setenta discípulos enviados por Jesus (Lc 10:1). Setenta semanas de Daniel (Dn 9:24). Setenta anos de exílio (Jr 25:11-12). A distribuição das setenta nações entre os setenta *bene Elohim* estabelece uma **estrutura de governo celestial** que cobre toda a terra.

A **Regra 6 de Hilel** (*ke-yotze bo mi-maqom acher*) autoriza conectar a Tabela das Nações (Gn 10) com Deuteronômio 32:8-9 e Jubileus 15. Três passagens independentes tratam da mesma estrutura: as nações foram distribuídas a seres celestiais. O princípio é triplamente atestado.

### 1.3 Israel como a Porção de Yahweh

O versículo 9 é a chave da teologia da eleição de Israel: *"Porque a porção do Senhor é o seu povo; Jacó é a parte da sua herança."*

Enquanto as outras nações foram distribuídas aos *bene Elohim*, Israel foi retido como possessão direta de Yahweh. Isso não significa que as outras nações estavam abandonadas; significa que a pedagogia divina para com elas seria mediada por seres celestiais — e que essa mediação falhou catastróficamente.

A eleição de Israel não é favoritismo; é **estratégia missionária**. Israel foi escolhido para ser o canal através do qual as nações seriam trazidas de volta à adoração do Deus verdadeiro. O plano era: Yahweh governa Israel diretamente; Israel vive como reino sacerdotal (Êx 19:6); as nações veem a sabedoria de Israel e são atraídas ao Deus de Israel; os *sarim* perdem sua jurisdição à medida que as nações se voltam para Yahweh.

Mas o plano encontrou resistência em ambas as frentes: Israel se rebelou e adotou os deuses das nações (idolatria), e os *sarim* se corromperam e retiveram as nações em trevas.

A **Regra 1 de Hilel** (*kal va-chomer*) emerge: se Israel, governado diretamente por Yahweh, caiu em idolatria repetidamente, **quanto mais** as nações sob os *sarim* caíram. A falha de Israel é medida por um padrão mais alto precisamente porque seus privilégios eram maiores.

