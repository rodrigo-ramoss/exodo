## Capítulo 3 — O Salmo 82 e a Corrupção dos Sarim

### 3.1 Deus Julgando os Elohim

O Salmo 82 é o texto mais explícito sobre a corrupção dos príncipes territoriais. É uma cena de tribunal celestial onde Deus julga os *elohim* — os mesmos seres a quem as nações foram distribuídas:

*"Deus assiste na congregação dos poderosos (adat El); no meio dos deuses (elohim) julga."* (Sl 82:1)

A palavra *elohim* é usada duas vezes no mesmo versículo com sentidos distintos: o primeiro *Elohim* é Yahweh, o Deus supremo; o segundo *elohim* são os seres celestiais do conselho divino. A mesma palavra para realidades distintas — um fenômeno linguístico que causa confusão teológica quando ignorado.

O verbo *assiste* (*nitzav*) significa "tomar posição, postar-se". Deus está se levantando na assembleia para julgar. A *adat El* (congregação de Deus) é o conselho divino, a mesma assembleia que Jó 1-2 e 1 Reis 22 descrevem.

O versículo 2 contém a acusação formal:

*"Até quando julgareis injustamente, e aceitareis as pessoas dos ímpios? (Selá)"*

Os *elohim* estão sendo acusados de **julgar injustamente**. Como governantes das nações, sua função era administrar justiça e conduzir a humanidade à adoração do Deus verdadeiro. Em vez disso, tornaram-se parciais, favorecendo os ímpios, aceitando suborno (adoração que não direcionavam a Deus) e corrompendo a justiça.

A **Tipologia 3 (Institucional)** do conselho divino está em colapso. A instituição que Deus criou para governar as nações está falida. Os oficiais nomeados tornaram-se corruptos. O tribunal que deveria proteger os fracos está oprimindo-os.

### 3.2 A Acusação: Injustiça e Parcialidade

Os versículos 3-4 detalham as obrigações negligenciadas:

*"Fazei justiça ao pobre e ao órfão; justificai o aflito e o necessitado. Livrai o pobre e o necessitado; tirai-os das mãos dos ímpios."*

A linguagem é a mesma dos profetas denunciando a injustiça de Israel. Mas aqui o alvo são os governantes celestiais das nações. O resultado da corrupção dos *sarim* é a **injustiça estrutural** nas culturas pagãs: opressão dos pobres, desamparo dos órfãos, impunidade dos poderosos.

A idolatria e a injustiça social andam juntas. Quando os deuses são corruptos, a sociedade reflete essa corrupção. A adoração aos *sarim* — disfarçados de Baal, Marduque, Zeus e todos os deuses do panteão mundial — produz culturas de morte. Os sacrifícios infantis a Moloque, a prostituição ritual, a opressão imperial — tudo isso é fruto direto da governança dos *sarim* corrompidos.

O versículo 5 denuncia a ignorância resultante:

*"Eles não conhecem, nem entendem; andam em trevas; todos os fundamentos da terra vacilam."*

Os "eles" provavelmente são as nações governadas pelos *sarim*. A corrupção celestial produz cegueira terrena. As nações andam em trevas porque seus príncipes espirituais as mantêm nas trevas (cf. 2 Co 4:4 — "o deus deste século cegou os entendimentos dos incrédulos").

### 3.3 A Sentença: "Como Homens Morrereis"

A sentença sobre os *sarim* corruptos é uma das mais terríveis da Bíblia:

*"Eu disse: Vós sois deuses (elohim), e todos vós filhos do Altíssimo. Todavia, como homens morrereis, e caireis como qualquer dos príncipes."* (Sl 82:6-7)

Os *sarim* são *elohim* (seres celestiais) e *filhos do Altíssimo* (membros do conselho divino) — títulos de dignidade. Mas sua dignidade não os isenta do juízo. A sentença é a **mortalidade**: "como homens morrereis". A imortalidade angelical será revertida. Eles cairão como qualquer príncipe terreno.

Jesus cita o Salmo 82:6 em João 10:34-36 como argumento para sua própria divindade:

*"Respondeu-lhes Jesus: Não está escrito na vossa lei: Eu disse: Vós sois deuses? Pois, se a lei chamou deuses àqueles a quem a palavra de Deus foi dirigida (e a Escritura não pode ser anulada) — àquele a quem o Pai santificou, e enviou ao mundo, vós dizeis: Blasfemas, porque disse: Sou Filho de Deus?"*

O argumento de Jesus é um *kal va-chomer* (Regra 1 de Hilel): se a Escritura chama seres celestiais criados de "deuses" e "filhos de Deus", quanto mais aquele que o Pai santificou e enviou ao mundo pode ser chamado Filho de Deus. Jesus está usando a categoria dos *sarim* como ponto de partida para afirmar sua divindade superior.

O versículo 8 conclui o Salmo com um clamor escatológico:

*"Levanta-te, ó Deus, julga a terra; pois a ti pertencem todas as nações."*

A resposta à corrupção dos *sarim* é a intervenção direta de Deus como juiz. As nações foram distribuídas aos *sarim*, mas pertencem a Yahweh. O juízo final será a **reversão de Deuteronômio 32:8**: Deus retomará o governo direto sobre todas as nações. Apocalipse 11:15 ecoa esse clamor: *"Os reinos do mundo vieram a ser de nosso Senhor e do seu Cristo, e ele reinará para todo o sempre."*

