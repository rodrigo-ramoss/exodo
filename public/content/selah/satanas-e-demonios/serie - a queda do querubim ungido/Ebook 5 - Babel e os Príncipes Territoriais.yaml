## Ponte para o Volume 6: Belial — O Adversário Consumado

Ao longo desta série, encontramos o querubim caído sob múltiplos nomes e funções. Gadreel, a serpente que enganou Eva. *Ha-Satan*, o acusador no tribunal divino. Azazel, o líder da corrupção tecnológica. Semihazah, o chefe do juramento do Hermon. Mastema, o comandante dos espíritos imundos. O *sar* corrompido, o *kosmokrator* deste mundo tenebroso.

No sexto volume, vamos investigar como essas múltiplas manifestações se unificam na figura de **Belial** — o nome que domina a literatura de Qumran para designar o arqui-inimigo escatológico. Paulo usa esse nome em 2 Coríntios 6:15 ("Que concórdia há entre Cristo e Belial?"). João o descreve como o Dragão, a Antiga Serpente, o Diabo, Satanás (Ap 12:9). É a convergência de todos os títulos e funções.

Vamos também ao confronto direto: a tentação de Jesus no deserto (Mateus 4). O encontro entre o Segundo Adão e o querubim caído. O que estava em jogo? O que as três tentações significam? E por que Satanás fugiu "até outro tempo oportuno" — e quando esse tempo será?

Prepare-se para o confronto final.

