## Capítulo 1 — A Estrutura do Conselho Divino

### 1.1 Os Filhos de Deus se Apresentam

O prólogo de Jó nos transporta diretamente para dentro da corte celestial com uma naturalidade desconcertante:

*"E num dia em que os filhos de Deus vieram apresentar-se perante o Senhor, veio também Satanás entre eles. Então o Senhor disse a Satanás: De onde vens? E Satanás respondeu ao Senhor: De rodear a terra, e de passear por ela."* (Jó 1:6-7)

A expressão "filhos de Deus" (*bene ha-elohim*) é técnica. Em todo o Antigo Testamento, designa seres celestiais que compõem a corte de Yahweh — nunca seres humanos. Eles "se apresentam" (*le-hityatsev*), verbo que carrega o sentido de assumir posição formal, como soldados em formação ou oficiais perante um rei. Não é uma visita social; é uma **convocação oficial** do conselho.

O fato de Satanás vir "entre eles" (*betokham*) é juridicamente revelador: ele ainda pertence a essa assembleia. Sua presença não é uma invasão; é um comparecimento regular. O querubim caído não perdeu seu lugar no conselho imediatamente; perdeu sua santidade, mas reteve seu acesso. A degradação foi progressiva: primeiro a queda moral (Ez 28), depois a restrição funcional, e finalmente a expulsão definitiva (Ap 12).

A pergunta de Deus — "De onde vens?" — não é pedido de informação. É intimação judicial. No tribunal, as partes declaram sua jurisdição e propósito. A resposta do acusador — "De rodear a terra, e de passear por ela" — define sua esfera de operação atual: ele não está mais no monte santo, entre as pedras de fogo; está na terra, circulando. Isso confirma a maldição de Gênesis 3:14 ("sobre o teu ventre andarás, e pó comerás"). Mas confirma também que, embora rebaixado, ele ainda tem acesso ao tribunal.

O Salmo 82, pedra angular da teologia do conselho, abre com: *"Deus assiste na congregação dos poderosos; no meio dos deuses (elohim) julga."* A palavra *elohim* aqui não designa Yahweh, mas os membros do conselho — os mesmos "filhos de Deus" que comparecem em Jó. O cenário é um tribunal onde Deus preside e julga, inclusive, os próprios *elohim*. O versículo 6-7 declara: *"Eu disse: Vós sois deuses (elohim), e todos vós filhos do Altíssimo. Todavia, como homens morrereis, e caireis como qualquer dos príncipes."*

A **Regra 7 de Hilel** (*davar ha-lamed me-inyano* — "ensinado pelo contexto") nos obriga a ler Jó 1-2 dentro do contexto mais amplo da teologia do conselho divino. Sem essa moldura, a cena parece uma curiosidade mitológica. Com ela, entendemos que o texto narra uma sessão real do tribunal celestial, com implicações jurídicas para a terra.

### 1.2 A Linguagem da Corte Celestial

O conselho divino não é uma metáfora poética. É uma estrutura funcional que permeia toda a Bíblia hebraica e encontra eco no Novo Testamento. Precisamos dominar seu vocabulário técnico para compreender as operações do acusador.

Os termos principais são:

**Sod** (סוד) — "conselho, assembleia secreta". Jeremias 23:18 pergunta: *"Quem esteve no conselho (sod) do Senhor, e viu, e ouviu a sua palavra?"* O verdadeiro profeta é aquele que teve acesso ao *sod* divino, onde as decisões são tomadas. O falso profeta fala do seu próprio coração.

**Edah** (עדה) — "congregação, assembleia". Salmo 82:1: *"Deus assiste na congregação (edah) dos poderosos."* É o termo que designa a reunião formal do conselho.

**Bene ha-Elohim** (בני האלהים) — "filhos de Deus". Membros do conselho, seres celestiais criados por Deus. Aparecem em Jó 1-2, 38:7, Gênesis 6:2,4, Deuteronômio 32:8 (na versão mais antiga, preservada na Septuaginta e em Qumran).

**Ha-Satan** (השטן) — "o acusador", "o adversário". O artigo definido *ha* é crucial: indica que não é um nome próprio, mas um **título funcional**. Assim como há "o copeiro", "o escrivão", "o arauto" na corte de um rei terreno, há "o acusador" na corte celestial. O querubim caído ocupa essa função.

Esta é uma das percepções mais importantes deste volume: **o querubim caído não é um inimigo externo que invade o céu; é um oficial interno que se corrompeu, mas cujo cargo ainda opera dentro da estrutura judicial estabelecida por Deus**. Isso não significa que Deus aprove sua moral, mas que Ele o mantém funcional dentro do tribunal até o tempo determinado. A *Tipologia 3 (Institucional)* aplica-se aqui: o ofício de acusador no conselho divino é uma instituição que, embora ocupada por um ser caído, serve ao propósito de testar e refinar os servos de Deus — até que o Sumo Sacerdote verdadeiro assuma o tribunal e o acusador seja despejado.

Apocalipse 12:10 ecoa exatamente essa linguagem: *"o acusador de nossos irmãos, que os acusava de dia e de noite diante do nosso Deus."* A função do acusador é contínua (dia e noite), formal (diante de Deus) e forense (acusar).

### 1.3 O Conselho em Qumran e na Literatura Enoquita

A comunidade de Qumran preservou e expandiu a teologia do conselho divino com riqueza de detalhes impressionante. A Regra da Comunidade (1QS) e o Rolo da Guerra (1QM) fornecem o vocabulário que mais tarde aparecerá em Paulo, João e no autor de Hebreus.

**A Doutrina dos Dois Espíritos (1QS 3:13-4:26)** descreve o cosmos como estruturado sob dois comandantes: o Príncipe da Luz e o Anjo das Trevas. O texto declara:

*"Ele criou o homem para governar o mundo, e pôs nele dois espíritos para nele caminhar até o tempo da sua visitação. Eles são os espíritos da verdade e da perversidade."* (1QS 3:18-19)

O Anjo das Trevas (*Mal'akh Choshek*) é identificado em outros textos de Qumran como **Belial** — nome que Paulo usará em 2 Coríntios 6:15. A oposição entre os dois espíritos não é dualismo ontológico (bem e mal como princípios eternos equivalentes), mas **dualismo escatológico**: Deus criou ambos, mas a vitória do Espírito da Verdade é certa, e o Espírito da Perversidade será destruído no tempo da visitação.

**O Rolo da Guerra (1QM)** descreve a batalha final entre os "filhos da luz" e os "filhos das trevas", com Miguel como comandante supremo das forças celestiais fiéis, opondo-se diretamente a Belial e suas hostes. 1QM 1:1 abre:

*"Para o Instrutor: a Regra da Guerra. No início a mão dos filhos da luz começará contra o lote dos filhos das trevas, contra o exército de Belial..."*

A estrutura de comando é precisa: Miguel lidera os anjos fiéis e os justos da terra; Belial lidera os anjos caídos e os ímpios da terra. Esta é a mesma estrutura que Apocalipse 12 pressupõe.

**11QMelchizedek (11Q13)** é particularmente relevante para este volume. Descreve Melquisedeque como figura celestial que, no décimo jubileu (o jubileu escatológico), executará o juízo de Deus contra Belial e seus espíritos, libertando os cativos. O texto aplica Isaías 61:1-2 a Melquisedeque, proclamando-o como aquele que "anunciará a libertação aos cativos" no Dia da Expiação cósmico.

Quando o autor de Hebreus desenvolve sua cristologia de Melquisedeque (Hb 5-7), está dialogando diretamente com essa tradição. Ele está dizendo: aquele Melquisedeque que vocês esperam como juiz escatológico e libertador dos cativos **já veio, e é Jesus**.

A **Regra 6 de Hilel** (*ke-yotze bo mi-maqom acher* — "como em outro lugar") opera entre essas fontes e o Novo Testamento. Passagens que tratam do conselho divino, do acusador e do juízo se iluminam mutuamente por tratarem do mesmo padrão estrutural.

