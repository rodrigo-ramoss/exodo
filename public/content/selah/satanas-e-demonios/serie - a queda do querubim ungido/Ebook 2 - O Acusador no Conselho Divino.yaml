## Capítulo 3 — O Processo de Josué, o Sumo Sacerdote

### 3.1 Zacarias 3: O Tribunal e o Sumo Sacerdote Sujo

A quarta visão de Zacarias é um dos textos mais densos do Antigo Testamento sobre o funcionamento do tribunal celestial:

*"E me mostrou o sumo sacerdote Josué, o qual estava diante do anjo do Senhor, e Satanás estava à sua mão direita, para se lhe opor (le-sitno). O Senhor te repreenda, ó Satanás."* (Zc 3:1-2a)

Detalhemos os elementos jurídicos:

**O réu:** Josué, filho de Jozadaque, sumo sacerdote histórico que retornou do exílio babilônico e liderou a reconstrução do templo junto com Zorobabel (Esdras 3:2; Ageu 1:1). Ele está "diante do anjo do Senhor" — posição de quem é julgado.

**O acusador:** *Ha-Satan*, posicionado à direita do réu. No direito hebraico, o acusador ficava à direita do acusado (cf. Sl 109:6: *"Põe sobre ele um ímpio, e Satanás esteja à sua direita"*). Sua função é *satan* — verbo que significa "opor-se, acusar, adversar".

**O juiz/defensor:** O *Mal'akh Yahweh* — o Anjo do Senhor. A identidade dessa figura é um dos pontos debatidos (cf. Códice Cosmológico § 14), mas a tradição patrística e muitos exegetas contemporâneos a identificam como o *Logos* pré-encarnado. Note que ele acumula as funções de juiz e defensor — algo impossível em tribunal humano, mas perfeitamente coerente na economia divina.

**A evidência contra o réu:** O versículo 3 revela: *"Josué, vestido de vestes sujas, estava diante do anjo."* As vestes sujas (*begadim tso'im*) representam impureza ritual e moral. O sumo sacerdote, que deveria estar imaculadamente vestido para ministrar diante de Deus, está contaminado.

A acusação do *satan* não é registrada explicitamente, mas pode ser reconstruída pelo contexto: Josué e o sacerdócio que ele representa falharam; o exílio foi merecido; como podem agora ministrar diante de Deus? A acusação não é falsa no conteúdo — Josué realmente está sujo. Mas é perversa na intenção: busca a condenação, não a restauração.

### 3.2 O Anjo do Senhor como Juiz e Defensor

A resposta do Anjo do Senhor é uma das declarações mais belas da graça antecipada no Antigo Testamento:

*"O Senhor te repreenda, ó Satanás; sim, o Senhor, que escolheu Jerusalém, te repreenda. Não é este um tição tirado do fogo?"* (Zc 3:2)

Três elementos fulminam a acusação:

**Primeiro, a autoridade delegada ao Anjo.** Ele não repreende Satanás em seu próprio nome, mas no nome do Senhor. A fórmula *yig'ar Yahweh bekha* é linguagem de exorcismo judicial — a expulsão de um acusador do tribunal por ordem da autoridade suprema.

**Segundo, a eleição como fundamento da defesa.** "O Senhor, que escolheu Jerusalém." A defesa não alega inocência de Josué (ele é culpado; as roupas sujas provam), mas **eleição**. Josué não é justificado porque nunca pecou, mas porque Deus escolheu Jerusalém e, com ela, o sacerdócio que a serve. Este é o prenúncio da doutrina paulina da justificação: somos declarados justos não por obras, mas por eleição graciosa em Cristo.

**Terceiro, a metáfora do "tição tirado do fogo".** Um tição é um pedaço de madeira queimada, prestes a ser consumido. Josué é um sobrevivente do exílio — o fogo do juízo babilônico. O fato de ter sido poupado não é prova de mérito, mas de **misericórdia preservadora**.

Então ocorre a purificação:

*"Tirai-lhe estas vestes sujas. E a ele lhe disse: Eis que tenho feito com que passe de ti a tua iniquidade, e te vestirei de vestes novas."* (Zc 3:4)

A troca de vestes é **tipologia ritual** (um dos 8 tipos). O sacerdote é despido de sua impureza e revestido de justiça por um ato soberano do tribunal, não por mérito próprio. Isto prefigura diretamente a justificação: *"revesti-vos do Senhor Jesus Cristo"* (Rm 13:14); *"porque todos quantos fostes batizados em Cristo já vos revestistes de Cristo"* (Gl 3:27).

A coroa limpa colocada sobre sua cabeça (v. 5) e a nova comissão (v. 6-7) completam o rito de reinvestidura. O acusador foi silenciado, a impureza removida, o sacerdote reinstalado. O tribunal que parecia ser de condenação tornou-se tribunal de **justificação**.

A **Regra 3 de Hilel** (*binyan av mi-katuv echad* — princípio-pai derivado de um texto) opera aqui com força total. Zacarias 3 é o caso específico que revela o princípio universal: **o acusador será silenciado, e o pecador arrependido será purificado e reinvestido, com base na eleição divina e na obra do Anjo do Senhor**. Este princípio-pai se cumpre plenamente em Cristo, que é simultaneamente o Anjo do Senhor encarnado, o Sumo Sacerdote verdadeiro e o Tição tirado do fogo por excelência — Aquele que passou pela morte e ressuscitou.

### 3.3 A Purificação e a Nova Investidura

O desfecho do processo de Josué não é apenas absolvição, mas **promoção**. Após a purificação, o Anjo do Senhor lhe dá uma comissão condicional:

*"Assim diz o Senhor dos Exércitos: Se andares nos meus caminhos, e se observares a minha ordenança, também tu julgarás a minha casa, e também guardarás os meus átrios, e te darei lugar entre os que estão aqui."* (Zc 3:7)

"Os que estão aqui" são os membros do conselho divino, os mesmos "filhos de Deus" que se apresentaram em Jó 1-2 e entre os quais o acusador estava. A promessa a Josué é **acesso ao conselho** — o privilégio de participar da assembleia celestial, não como acusado, mas como membro.

O versículo 8 conecta tudo à esperança messiânica: *"Porque eis aqui a pedra que pus diante de Josué; sobre esta pedra única estão sete olhos; eis que eu esculpirei a sua escultura, diz o Senhor dos Exércitos, e tirarei a iniquidade desta terra num só dia."*

A "pedra" é figura messiânica (cf. Sl 118:22; Is 28:16; Dn 2:34-35). Os "sete olhos" ecoam as sete lâmpadas do candelabro em Zacarias 4 e, em Apocalipse, os sete espíritos de Deus (Ap 5:6). "Tirar a iniquidade num só dia" aponta para o Dia da Expiação definitivo — o Calvário.

Este é um dos textos onde a ignorância da literatura do Segundo Templo produz o maior buraco hermenêutico. O Melquisedeque Celestial de 11QMelch aplica Isaías 61 a um libertador escatológico que proclamará o jubileu e julgará Belial. Zacarias 3 é o equivalente canônico dessa expectativa: o Sumo Sacerdote purificado, o Acusador silenciado, a iniquidade removida — tudo prefigurando a obra do Messias.

