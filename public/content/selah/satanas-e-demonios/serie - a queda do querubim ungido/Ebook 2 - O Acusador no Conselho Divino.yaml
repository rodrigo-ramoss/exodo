## Ponte para o Volume 3: A Segunda Rebelião — Os Vigilantes e o Monte Hermon

No próximo volume, desceremos com os anjos rebeldes. Até agora, estudamos a queda de um querubim. Mas a rebelião não permaneceu solitária. Gênesis 6:1-4 narra, com impressionante economia de palavras, um evento que a literatura do Segundo Templo expande em detalhes perturbadores: duzentos Vigilantes desceram ao Monte Hermon, liderados por Semihazah e Azazel, e tomaram mulheres humanas.

A segunda rebelião não foi apenas espiritual; foi **genética**. Os Nefilim nasceram — híbridos de uma união proibida entre ordens criacionais distintas. O dilúvio foi a resposta cirúrgica de Deus. Mas a história não terminou ali.

Vamos investigar 1 Enoque 6-16, Jubileus 5, 2 Pedro 2, Judas 6-7 e as evidências de uma segunda incursão pós-diluviana registrada em Números e Deuteronômio. O acusador do tribunal tornou-se, na terra, o corruptor da criação.

Prepare-se para o Monte Hermon.

