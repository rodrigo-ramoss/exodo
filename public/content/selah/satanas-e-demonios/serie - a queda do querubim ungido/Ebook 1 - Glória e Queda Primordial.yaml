## Capítulo 3 — A Serpente que Não Era Cobra

### 3.1 Gadreel e a Tentação do Éden Terreno

Quem, exatamente, era a serpente de Gênesis 3? O texto hebraico diz simplesmente: *"A serpente (nachash) era o mais astuto de todos os animais do campo que o Senhor Deus tinha feito."* Por milênios, leitores cristãos se perguntaram: como uma cobra falou? Como uma cobra teve inteligência para dialogar teologicamente com Eva? A resposta da teologia bíblica nativa não é que a serpente era um animal possuído; é que a serpente era o **disfarce de um ser celestial rebelde**.

Apocalipse 12:9 e 20:2 identificam retroativamente a serpente do Éden como "o Diabo e Satanás". Mas a literatura do Segundo Templo já havia nomeado esse ser com precisão. 1 Enoque 69:6 declara:

*"E o terceiro se chamava Gadreel; este é o que mostrou aos filhos dos homens todos os golpes da morte, e foi ele que desencaminhou Eva, e mostrou os instrumentos de morte aos filhos dos homens — o escudo, a cota de malha, a espada para guerra, e todos os instrumentos de morte aos filhos dos homens."*

**Gadreel** (גדריאל) é o nome enoquita do querubim que entrou no jardim terreno. O nome provavelmente deriva de *gader* (muro, cerca) e *El* (Deus) — "Deus é minha cerca" ou, ironicamente, "cerca de Deus". Aquele que deveria ser o guardião do santuário transformou‑se no invasor.

A conexão entre o querubim ungido de Ezequiel 28 e Gadreel é feita pela **Regra 2 de Hilel** (*gezerah shavah*) implícita: ambos são descritos como estando no Éden, ambos possuem sabedoria sobrenatural, ambos são associados à serpente. A tradição judaica do Segundo Templo unificou essas figuras, e o Novo Testamento sancionou essa unificação (Ap 20:2).

Mas como um querubim — uma criatura de fogo e luz, com asas e múltiplas faces (Ez 1) — pode ter aparecido como uma serpente? A resposta está na natureza *multiforme* dos seres celestiais e na escolha deliberada de um disfarce com significado teológico profundo.

### 3.2 O Relato de Gênesis 3 à Luz de 1 Enoque

A tradição enoquita expande a narrativa da queda de uma forma que lança luz sobre as motivações do tentador. A Vida de Adão e Eva, já mencionada, apresenta o diabo confessando que sua hostilidade contra o casal humano nasceu do ciúme: ele se recusou a adorar a imagem de Deus na criatura terrena. Quando Deus exaltou Adão acima dos anjos ao fazê‑lo à Sua imagem e semelhança (Sl 8:5‑6; Hb 2:7‑9), o orgulho do querubim foi ferido. A serpente no Éden não foi apenas um ato de tentação; foi um ato de **vingança cósmica**.

Gênesis 3:1 descreve a serpente como *arum* — "astuta, sagaz". A mesma raiz hebraica aparece em Provérbios e Jó com o sentido de prudência e inteligência estratégica. O que Eva encontrou não foi um animal falante; foi um ser de inteligência angélica operando através de um corpo serpentino. O diálogo revela sofisticação teológica: a serpente cita a ordem de Deus (Gn 2:16‑17) e a distorce com precisão cirúrgica — "É assim que Deus disse: Não comereis de toda a árvore do jardim?" — uma meia‑verdade calculada para plantar dúvida.

A **Regra 7 de Hilel** (*davar ha‑lamed me‑inyano* — "ensinado pelo contexto") exige que leiamos Gênesis 3 não isoladamente, mas dentro do contexto mais amplo da guerra cósmica que Gênesis 6, Jó 2, Zacarias 3 e Apocalipse 12 subsequentemente revelam. O *nachash* do jardim não é um enigma zoológico; é o primeiro ato de sabotagem do querubim caído contra o projeto redentor de Deus — o ataque preventivo contra a **semente da mulher**.

Jubileus 3:17‑25 acrescenta um detalhe intrigante: antes da queda, os animais falavam. A serpente não era, portanto, uma anomalia da natureza, mas a exploração maligna de uma capacidade natural ainda não corrompida. O adversário escolheu o animal considerado *arum* (astuto) como veículo porque a sagacidade era o traço natural que espelhava sua própria natureza pervertida.

### 3.3 Por que uma Serpente? A Anatomia da Sedução

A escolha da serpente como forma não foi arbitrária. Em todo o Antigo Oriente Próximo, a serpente era um símbolo ambíguo — associada tanto à sabedoria e cura (a serpente de bronze de Números 21; o caduceu grego) quanto ao caos e perigo (o Leviatã; a serpente do caos nos mitos cananeus). O Egito, onde Israel aprendeu o que não fazer, venerava a serpente como divindade (a deusa‑cobra Uatchit, o *uraeus* na coroa do Faraó). Ao assumir a forma de serpente, o querubim caído estava, ironicamente, inaugurando a idolatria que mais tarde dominaria as nações: a adoração da criatura em lugar do Criador (Rm 1:25).

A maldição de Gênesis 3:14‑15 é carregada de simbolismo: *"Sobre o teu ventre andarás, e pó comerás todos os dias da tua vida."* No sentido literal, a serpente física foi rebaixada. No sentido cósmico, o ser que operava através dela foi **rebaixado da esfera celestial para a terrena**. As "pedras de fogo" deram lugar ao pó. De querubim ungido que cobria o trono, ele se tornou aquele que rasteja na esfera mais baixa da criação — mas ainda assim, perigosamente ativo.

A profecia da inimizade entre a semente da mulher e a semente da serpente será o tema central do próximo capítulo. Antes de chegarmos lá, fixemos o ponto: **a serpente era Gadreel, o querubim ungido caído, operando em disfarce**. Todo o restante da narrativa bíblica — a guerra contra os descendentes da promessa, a possessão demoníaca nos evangelhos, a besta do Apocalipse — é o desenrolar dessa primeira batalha no jardim.

