## Ponte para o Volume 2: O Acusador no Conselho Divino

No próximo volume, ingressaremos na sala do trono. Vamos investigar o funcionamento do conselho divino — a assembleia dos filhos de Deus — e o papel que o adversário exerceu como *ha‑satan*, o acusador oficial. Examinaremos Jó 1‑2, Zacarias 3, 1 Reis 22 e os registros de Qumran que descrevem a liturgia celestial.

Ali descobriremos que, mesmo após a queda, o querubim ainda tinha acesso ao conselho. Sua função foi corrompida, mas não sua localização. Por séculos ele compareceu diante de Deus como promotor dos santos. Até que algo aconteceu. Alguém o expulsou. Alguém levantou‑se do trono e disse: "Agora é chegada a salvação, e o poder, e o reino do nosso Deus, e a autoridade do seu Cristo; porque já foi precipitado o acusador de nossos irmãos" (Ap 12:10).

Essa é a história do Volume 2. Prepare‑se para a sala do tribunal.

