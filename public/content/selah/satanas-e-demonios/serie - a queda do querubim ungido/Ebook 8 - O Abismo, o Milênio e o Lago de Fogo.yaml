## Capítulo 2 — O Aprisionamento no Abismo: Apocalipse 20:1-3

### 2.1 O Anjo com a Chave e a Grande Corrente

Apocalipse 20:1-3 abre o ato final da história cósmica:

*"E vi um anjo descer do céu, que tinha a chave do abismo e uma grande corrente na sua mão. Ele prendeu o dragão, a antiga serpente, que é o Diabo e Satanás, e amarrou-o por mil anos. E lançou-o no abismo, e ali o encerrou, e pôs selo sobre ele, para que mais não engane as nações, até que os mil anos se acabem. E depois importa que seja solto por um pouco de tempo."*

Cada detalhe desta cena é juridicamente carregado.

**O anjo:** Não é Cristo, mas um anjo específico comissionado para esta tarefa. A tradição identifica este anjo como Miguel (1QM 17; Ap 12:7-9), o arcanjo que liderou a expulsão de Satanás do céu e que agora executa sua prisão. O fato de um anjo — e não o próprio Cristo — prender Satanás demonstra que o querubim caído está tão reduzido em poder que um mensageiro celestial é suficiente para subjugá-lo.

**A chave do abismo:** O abismo tem uma porta, uma fechadura e uma chave. Não é um buraco sem fundo no sentido vago; é uma **prisão com controle de acesso**. A chave está nas mãos de um anjo fiel, que a recebeu de Deus (cf. Ap 1:18, onde Cristo tem "as chaves da morte e do inferno"). O controle do abismo pertence a Deus e é delegado a Seus agentes — não a Satanás.

**A grande corrente:** A imagem evoca 1 Enoque 10:4-6 e Judas 6, onde os anjos caídos são "amarrados com cadeias eternas" e "reservados na escuridão". A "grande corrente" indica a força da prisão. Satanás será imobilizado — não meramente restringido, mas preso, amarrado, inativo. Durante o milênio, ele não poderá operar na terra.

**O selo:** No mundo antigo, selos eram aplicados a documentos e portas para garantir que não fossem violados sem autorização. O selo sobre o abismo é a garantia divina de que Satanás não escapará antes do tempo determinado. A mesma imagem aparece no sepulcro de Jesus (Mt 27:66 — os guardas selam a pedra) e nos 144.000 selados (Ap 7:3). O selo é a marca de propriedade e proteção divina.

**"Para que mais não engane as nações":** O propósito específico do aprisionamento é impedir o engano. O engano (*planaō*) é a estratégia primordial de Satanás desde o Éden (Gn 3:13 — "a serpente me enganou"). O milênio será um período em que as nações estarão livres do engano satânico, permitindo que o reino messiânico se manifeste sem oposição espiritual direta.

A **Tipologia 7 (Histórica)** identifica um padrão: o enganador é progressivamente restringido. No Éden, atuou livremente. No ministério de Jesus, foi confrontado e derrotado em cada encontro. Na cruz, foi juridicamente condenado. No céu, foi expulso (Ap 12). No milênio, será preso. No fim, será destruído. Cada etapa é uma restrição progressiva de sua capacidade de enganar.

### 2.2 Os Mil Anos: Interpretações e Implicações

A duração do aprisionamento — "mil anos" (*chilia etē*) — é um dos pontos mais debatidos da escatologia. A Voz do Deserto, fiel à sua hermenêutica do Segundo Templo, oferece três observações:

**Primeiro, "mil anos" na literatura apocalíptica judaica frequentemente tem valor simbólico.** 2 Pedro 3:8 declara que "um dia para o Senhor é como mil anos, e mil anos como um dia". O Salmo 90:4 antecipa essa ideia. Em 1 Enoque, a história é estruturada em "semanas" e "jubileus" com durações simbólicas. Mas o número "mil" também pode ser literal: seis ocorrências em Apocalipse 20 usam *chilia etē*, e o contexto de ressurreições e eventos históricos sugere uma duração real, não meramente simbólica.

**Segundo, há três interpretações principais sobre o milênio:**

**Pré-milenismo:** Cristo retornará antes do milênio, estabelecerá seu reino na terra, e reinará por mil anos literais. Satanás será preso durante esse período. Após o milênio, Satanás será solto brevemente, ocorrerá a rebelião final, e então virá o juízo final e o estado eterno. Esta é a posição majoritária dos Pais da Igreja dos primeiros três séculos (Justino Mártir, Ireneu, Tertuliano) e da tradição enoquita-qumranita.

**Amilenismo:** O milênio é o período presente da Igreja, entre a primeira e a segunda vinda. Satanás está "preso" no sentido de que não pode impedir a expansão do evangelho. O número mil é simbólico para a plenitude do tempo. A posição foi desenvolvida por Agostinho e é majoritária na tradição reformada e católica.

**Pós-milenismo:** O milênio é um período futuro de triunfo do evangelho antes do retorno de Cristo, não necessariamente de mil anos literais. A Igreja cristianizará progressivamente o mundo antes da vinda final.

A Voz do Deserto adota o **pré-milenismo histórico**, em continuidade com a tradição do Segundo Templo e dos Pais pré-agostinianos. A razão principal é hermenêutica: Apocalipse 20 segue cronologicamente Apocalipse 19 (a segunda vinda de Cristo), e a prisão de Satanás é um evento específico, não um processo gradual. O querubim caído não está sendo "progressivamente restringido" na era da Igreja (ele está ativo — 1 Pe 5:8); ele será **preso** no abismo no futuro.

No entanto, a marca reconhece (§ 14 do Códice Cosmológico) que a duração literal ou simbólica dos mil anos é uma questão em aberto. O conteúdo Voz do Deserto deve sinalizar essa abertura.

**Terceiro, a estrutura de Apocalipse 20 é quiástica e progressiva.** João primeiro vê Satanás sendo preso (v. 1-3), depois os mártires reinando (v. 4-6), e finalmente Satanás sendo solto e destruído (v. 7-10). A sequência é temporal e lógica: a prisão de Satanás é a condição para o reinado dos santos; a soltura é a condição para a manifestação final do mal antes de sua destruição definitiva.

### 2.3 A Relação com a Prisão dos Vigilantes

O aprisionamento de Satanás no abismo deve ser distinguido da prisão dos Vigilantes no Tártaro (Volumes 3 e 4). São duas prisões, para dois grupos diferentes, em cronologias distintas:

| Prisão | Prisioneiros | Local | Início | Duração | Destino Final |
|--------|--------------|-------|--------|---------|---------------|
| Tártaro | Os duzentos Vigilantes (Semihazah, Azazel e outros) | Vales da terra / trevas | Após o dilúvio (Gn 6; 1 En 10) | "Setenta gerações" até o juízo final | Provavelmente o lago de fogo |
| Abismo (milênio) | Satanás (o dragão) sozinho | Abismo selado | No início do milênio (Ap 20) | Mil anos | Solto brevemente, depois lago de fogo |

A distinção é importante: os Vigilantes estão presos desde o dilúvio e não serão soltos; cumprem sua sentença de "setenta gerações" diretamente para o juízo final. Satanás, o líder supremo da rebelião, será preso mais tarde — no início do milênio — e será solto por um breve período antes do juízo final.

A **Regra 1 de Hilel** (*kal va-chomer*) opera aqui: se os subordinados (Vigilantes) foram presos imediatamente após o dilúvio, **quanto mais** o líder da rebelião será preso em algum momento. A prisão de Satanás no abismo é a extensão lógica da prisão dos Vigilantes no Tártaro.

