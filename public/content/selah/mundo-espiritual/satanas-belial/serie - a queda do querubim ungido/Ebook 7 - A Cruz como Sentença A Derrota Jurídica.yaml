## Capítulo 2 — O Despojamento dos Principados

### 2.1 Apekdysamenos: O Despir Triunfal

O versículo 15 de Colossenses 2 contém uma das imagens mais poderosas de toda a Bíblia, mas que depende de uma decisão de tradução crucial:

*"E, despindo os principados e as potestades, os expôs publicamente e deles triunfou em si mesmo."* (tradução comum)

A palavra *apekdysamenos* (ἀπεκδυσάμενος) é um particípio aoristo médio do verbo *apekdyomai*, que significa "despir, despojar, desarmar". O verbo contém dois prefixos: *apo* (de, fora) e *ek* (de dentro, completamente). A ação é total: um despojamento completo.

Mas a forma verbal é **média**, não ativa nem passiva. A voz média em grego indica que o sujeito realiza a ação sobre si mesmo ou em seu próprio interesse. Isso cria duas possibilidades de tradução, ambas teologicamente válidas e provavelmente coexistentes na intenção de Paulo:

**Opção 1 (Deus/Cristo despoja os principados):** "E, tendo despojado os principados e potestades..." Esta é a leitura da maioria das traduções. Deus, em Cristo, despiu os poderes espirituais de sua autoridade.

**Opção 2 (Cristo despe a si mesmo da carne ou despe os principados de si mesmo):** "E, tendo-se despido [da carne]..." Esta leitura conecta o verbo com o despojamento da encarnação ou com o ato de Cristo, em sua morte, livrar-se das acusações que os principados lançavam sobre ele.

A Voz do Deserto adota a leitura de que Cristo despojou os principados e potestades de sua **autoridade e armas**. O contexto favorece essa interpretação: Paulo está descrevendo a vitória sobre os poderes espirituais, não sobre a carne de Cristo. Os principados (*archai*) e potestades (*exousiai*) são os mesmos seres que Paulo menciona em Efésios 6:12 e que estudamos extensamente no Volume 5 — as hierarquias espirituais de oposição.

Na literatura apocalíptica judaica, o verbo "despir" (*ekdyō*) é usado para a remoção da armadura de um guerreiro derrotado. O guerreiro vencido tem sua armadura removida e é exposto à vergonha pública. Paulo está dizendo que Cristo removeu a armadura dos principados — sua autoridade, suas acusações, seu poder — e os expôs como derrotados.

A **Regra 7 de Hilel** (*davar ha-lamed me-inyano*) nos obriga a ler este verbo no contexto da metáfora militar romana que Paulo desenvolve. Em Efésios 6, Paulo descreve a armadura do cristão; aqui, ele descreve o desarmamento do inimigo. O crente veste a armadura porque Cristo já despiu a do adversário.

### 2.2 O Cortejo de Prisioneiros no Mundo Antigo

*"E, despindo os principados e potestades, **os expôs publicamente** (edeigmatisen en parrēsia), e **deles triunfou** (thriambeusas) em si mesmo."* (Cl 2:15)

As duas palavras gregas aqui são técnicas da cultura militar e jurídica romana:

**Edeigmatisen en parrēsia** (ἐδειγμάτισεν ἐν παρρησίᾳ): "expor publicamente, fazer um espetáculo público, humilhar abertamente". A palavra *deigmatizō* deriva de *deigma* (exemplo, amostra) e significa "fazer um exemplo de alguém, expor à vergonha". *Parrēsia* significa "abertamente, publicamente, com toda clareza".

No mundo antigo, um inimigo derrotado era frequentemente exposto em desfile público como demonstração de sua derrota. Reis capturados eram exibidos acorrentados. Generais vencidos tinham suas insígnias removidas e sua nudez exposta.

**Thriambeusas** (θριαμβεύσας): "triunfar sobre, conduzir em procissão triunfal". O verbo deriva de *thriambos* — o **triunfo romano**, a máxima honraria militar concedida a um general vitorioso. Durante um triunfo, o general desfilava em uma carruagem dourada, seguido por seus soldados, pelos despojos de guerra e — mais importante — pelos **inimigos capturados**, acorrentados e humilhados.

O apóstolo está descrevendo a cruz como um **triunfo romano ao contrário**. Aos olhos romanos, Jesus era o inimigo derrotado, desfilado pelas ruas de Jerusalém carregando sua cruz. Mas aos olhos celestiais, Jesus era o General vitorioso, e os principados e potestades eram os prisioneiros sendo exibidos em vergonha pública.

O triunfo romano terminava frequentemente com a execução dos líderes inimigos capturados. Paulo pode estar aludindo a isso também: a cruz, que parecia ser a execução de Jesus, era na verdade a **execução simbólica da autoridade dos principados**. Sua derrota foi decretada. Sua execução final no lago de fogo (Apocalipse 20:10) é apenas a consumação do que já foi decretado na cruz.

### 2.3 A Relação com a Prisão dos Vigilantes em 2 Pedro e Judas

O despojamento dos principados na cruz conecta-se diretamente com o que estudamos nos Volumes 3 e 4 sobre a prisão dos Vigilantes. 2 Pedro 2:4 e Judas 6 declaram que os anjos que pecaram foram "lançados no Tártaro" e "reservados em prisões eternas até o juízo".

A cruz é o evento jurídico que **confirma e executa parcialmente** a sentença sobre os Vigilantes. O que 1 Enoque 10 decretou — a prisão de Azazel e dos duzentos — foi ratificado e tornado irreversível pela cruz. O *cheirographon* cancelado inclui não apenas a dívida dos humanos redimidos, mas também o registro celestial da autoridade que os principados haviam usurpado.

A **Regra 4 de Hilel** (*binyan av mi-shnei ketuvim*) deriva o princípio-pai de Colossenses 2:15 e 2 Pedro 2:4: a cruz é o evento central da vitória sobre os poderes das trevas. Pedro enfatiza a prisão (*tartaroō*); Paulo enfatiza o despojamento (*apekdysamenos*). Ambos descrevem faces da mesma vitória judicial.

