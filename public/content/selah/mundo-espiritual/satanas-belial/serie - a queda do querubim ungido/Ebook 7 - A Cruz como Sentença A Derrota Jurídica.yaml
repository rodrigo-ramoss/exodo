## Ponte para o Volume 8: O Abismo, o Milênio e o Lago de Fogo

No oitavo e último volume canônico da série, acompanharemos a execução final da sentença. Da prisão no abismo durante o milênio (Ap 20:1-3) até o lago de fogo (Ap 20:10), passando pela última e breve soltura do adversário, veremos como o querubim ungido, cuja trajetória começou no Éden cósmico entre pedras de fogo, terminará em um lago de fogo preparado para ele e seus anjos.

Investigaremos também a natureza do milênio, as diferentes interpretações escatológicas, e o significado da "primeira ressurreição". 1 Enoque 10, 21 e 90 iluminarão as imagens apocalípticas de João. O Rolo da Guerra (1QM) nos mostrará como a expectativa da batalha final se cumpre em Apocalipse 19-20.

A história do querubim ungido terminará onde começou — em um jardim, mas desta vez o jardim da Nova Jerusalém, onde a árvore da vida floresce eternamente, e o inimigo não está mais lá.

