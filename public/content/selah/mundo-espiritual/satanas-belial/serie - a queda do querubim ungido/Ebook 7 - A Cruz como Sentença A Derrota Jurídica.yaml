## Capítulo 3 — O Sangue e o Propiciatório

### 3.1 Romanos 3:25 e o Hilastērion Cósmico

Romanos 3:23-25 contém uma afirmação cristológica cuja densidade frequentemente escapa aos leitores modernos que não conhecem o contexto cultual do Antigo Testamento:

*"Porque todos pecaram e destituídos estão da glória de Deus; sendo justificados gratuitamente pela sua graça, pela redenção que há em Cristo Jesus. Ao qual Deus propôs como **propiciação** (hilastērion) pela fé no seu sangue, para demonstração da sua justiça, havendo Deus, na sua paciência, remitido (ou: deixado impunes) os pecados anteriormente cometidos."*

A palavra *hilastērion* (ἱλαστήριον) é um termo técnico do culto levítico. Na Septuaginta, é a tradução padrão do hebraico *kapporet* (כפרת) — o **propiciatório**, a tampa de ouro puro da Arca da Aliança sobre a qual o sumo sacerdote aspergia o sangue no Dia da Expiação (Lv 16:14-15; Êx 25:17-22).

O propiciatório era o lugar mais sagrado do cosmos israelita. Sobre ele estavam os dois querubins de ouro; entre eles, a Shekinah (presença visível de Yahweh) se manifestava. Era ali que o sangue da expiação era aplicado, e era dali que Deus falava com Moisés (Êx 25:22). O propiciatório era, simultaneamente, o trono de Deus, o altar da expiação e o lugar do encontro.

Quando Paulo diz que Deus propôs Cristo como *hilastērion*, está fazendo uma afirmação de magnitude cósmica. Jesus é o **propiciatório vivo** — o lugar onde o sangue é aplicado, onde a misericórdia cobre o pecado, onde Deus se encontra com a humanidade pecadora sem violar Sua justiça.

A escolha dessa palavra não é aleatória. Na teologia paulina, a Arca da Aliança havia desaparecido com o exílio babilônico (2 Macabeus 2:4-8 preserva a tradição de que Jeremias a escondeu). O segundo templo não tinha Arca, nem propiciatório, nem Shekinah. Mas Paulo declara que Deus propôs um novo *hilastērion* — não escondido no Santo dos Santos, mas "publicamente exposto" (*proetheto* — a mesma raiz de *prothesis*, os pães da proposição).

A **Tipologia 4 (Objetal)** (Volume 1) atinge seu ápice. O propiciatório da Arca, o Altar do Holocausto, a Bacia de Bronze — todos os móveis do tabernáculo eram sombras de Cristo. Ele é o propiciatório onde o sangue é aplicado, o altar onde o Cordeiro é oferecido, a bacia que purifica.

### 3.2 Yom Kippur e os Dois Bodes na Cruz

A **Tipologia 6 (Ritual)** do Dia da Expiação (Volume 2) é essencial para compreender a obra da cruz. Em Levítico 16, o sumo sacerdote tomava dois bodes:

1. **O bode sacrificado a Yahweh** — cujo sangue era aspergido no propiciatório para expiação dos pecados do povo.
2. **O bode para Azazel** — sobre o qual o sacerdote impunha as mãos, confessava os pecados de Israel, e que era enviado ao deserto, ao "lugar árido", levando simbolicamente os pecados para longe.

A tradição rabínica antiga e 1 Enoque identificam Azazel como o líder dos Vigilantes caídos (Volume 3). O ritual do Yom Kippur, portanto, tinha um duplo movimento: o sangue **pagava** a dívida (bode sacrificado), e o pecado era **devolvido** ao seu autor original, o anjo rebelde que corrompeu a humanidade (bode para Azazel).

Na cruz, Cristo cumpriu ambos os aspectos simultaneamente:

- Como **bode sacrificado**, ele derramou seu sangue no propiciatório celestial, pagando a dívida e satisfazendo a justiça divina.
- Como **bode para Azazel**, ele carregou os pecados para fora do acampamento (Hb 13:12: *"padeceu fora da porta"*), para o lugar árido, devolvendo simbolicamente o pecado ao seu autor.

Mas há uma inversão: o bode para Azazel era enviado vivo ao deserto. Cristo morreu e ressuscitou. O pecado foi devolvido ao diabo, mas Cristo saiu vitorioso do deserto da morte.

A **Regra 1 de Hilel** (*kal va-chomer*) ressoa em Hebreus 9:13-14:

*"Porque, se o sangue dos bodes e touros, e a cinza de uma novilha esparzida sobre os imundos, os santifica, quanto à purificação da carne, **quanto mais** o sangue de Cristo, que pelo Espírito eterno se ofereceu a si mesmo imaculado a Deus, purificará a vossa consciência das obras mortas, para servirdes ao Deus vivo?"*

Se a sombra (sangue de animais) purificava a carne, **quanto mais** a realidade (sangue de Cristo) purifica a consciência e cancela o decreto de dívida.

### 3.3 O Sumo Sacerdote Entra no Santo dos Santos Celestial

Hebreus 9:11-12 descreve o momento culminante da obra expiatória de Cristo:

*"Mas Cristo, tendo vindo como sumo sacerdote dos bens futuros, por um maior e mais perfeito tabernáculo, não feito por mãos, isto é, não desta criação; nem por sangue de bodes e bezerros, mas por seu próprio sangue, entrou uma vez no santuário (ta hagia), havendo efetuado uma eterna redenção."*

O verbo "entrou" (*eisēlthen*, aoristo de *eiserchomai*) indica uma ação pontual e completada. O autor de Hebreus visualiza a ascensão de Cristo como a entrada do Sumo Sacerdote no Santo dos Santos celestial — o lugar que o querubim ungido havia profanado (Ez 28:18), o local da primeira rebelião (Volume 1).

Cristo não entrou com sangue de animais, mas com seu **próprio sangue**. O sangue que purificou o santuário não era de uma vítima substituta, mas do próprio ofertante, que é simultaneamente sumo sacerdote e vítima. Esta é uma categoria teológica sem precedentes: o ofertante, a oferta e o altar coincidem na pessoa de Jesus.

A purificação do santuário celestial é um conceito que frequentemente escapa à teologia popular, mas está no coração de Hebreus 9:23: *"Era necessário, pois, que as figuras das coisas que estão no céu assim se purificassem; mas as próprias coisas celestiais, com sacrifícios melhores do que estes."*

Se o santuário celestial precisava ser purificado, isso implica que ele havia sido **contaminado**. A contaminação original remonta à primeira rebelião, quando o querubim ungido profanou o monte santo de Deus com seu orgulho e comércio (Ez 28:18). A presença do acusador no conselho divino (Jó 1-2; Zc 3) era uma contaminação contínua. A segunda rebelião dos Vigilantes (Volume 3) e a corrupção dos *sarim* (Volume 5) estenderam essa contaminação.

Mas, em um único ato, Cristo purificou o céu. Seu sangue limpou o santuário celestial de toda mancha espiritual. A presença do acusador no tribunal divino foi cancelada. Apocalipse 12:10 declara que o acusador "foi precipitado" do céu. A cruz foi o fundamento jurídico; a ascensão foi a execução cerimonial; Apocalipse 12 é a manifestação apocalíptica da mesma vitória.

