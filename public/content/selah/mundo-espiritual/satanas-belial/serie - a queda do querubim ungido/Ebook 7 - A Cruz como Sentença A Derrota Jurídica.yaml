## Capítulo 4 — A Morte do Diabo e a Libertação dos Cativos

### 4.1 Hebreus 2:14-15: O Poder da Morte Desmantelado

Hebreus 2:14-15 é o texto mais explícito do Novo Testamento sobre a derrota existencial do diabo na cruz:

*"E, visto como os filhos participam da carne e do sangue, também ele participou das mesmas coisas, para que pela morte aniquilasse (katargēsē) o que tinha o império da morte, isto é, o diabo; e livrasse todos os que, com medo da morte, estavam por toda a vida sujeitos à servidão."*

O verbo *katargeō* (καταργέω) significa "aniquilar, destruir, reduzir a nada, tornar inoperante, ineficaz". Não significa aniquilação ontológica (o diabo não deixou de existir), mas **aniquilação funcional**: seu poder foi tornado inoperante. A mesma palavra é usada em 1 Coríntios 15:26 para a destruição da morte: "O último inimigo a ser destruído (*katargeitai*) é a morte."

O "império da morte" (*to kratos tou thanatou*) que o diabo detinha era um poder real, mas delegado e usurpado. O querubim caído havia se tornado "homicida desde o princípio" (Jo 8:44). Através do pecado, ele introduziu a morte na experiência humana (Rm 5:12). Através do medo da morte, ele mantinha a humanidade em escravidão psicológica e espiritual.

Mas, na cruz, o Filho de Deus entrou na morte voluntariamente — não como vítima indefesa, mas como **invasor**. Ele penetrou o domínio do diabo, experimentou a morte, e então a desmantelou de dentro. A ressurreição é a demonstração de que o poder da morte foi quebrado irreversivelmente.

O medo da morte era a arma psicológica suprema do diabo. O homem que teme a morte pode ser coagido a qualquer coisa — a negar a fé, a adorar ídolos, a colaborar com o mal. A ameaça de morte era o instrumento de controle do império romano e, nos bastidores celestiais, do império das trevas. Mas Cristo "livrou os que estavam sujeitos à servidão" ao demonstrar que a morte não tem a palavra final. O mártir cristão que não ama sua vida até a morte (Ap 12:11) neutralizou a última arma do adversário.

### 4.2 1 João 3:8: Desfazer as Obras do Diabo

1 João 3:8 condensa a missão de Cristo em uma frase de clareza cortante:

*"Quem comete o pecado é do diabo; porque o diabo peca desde o princípio. Para isto o Filho de Deus se manifestou: para desfazer (lysē) as obras do diabo."*

O verbo *lyō* (λύω) significa "desatar, dissolver, desfazer, destruir". É o oposto do verbo *deō* (amarrar). O que o diabo amarrou — o pecado, a morte, a acusação, a escravidão — Jesus veio desatar.

"Pecar desde o princípio" remonta a Gênesis 3 e 1 João 1:1 — o mesmo "princípio" do evangelho de João. O diabo peca desde o jardim do Éden. Sua obra primordial foi a sedução de Eva (Gadreel, 1 Enoque 69:6) que resultou na Queda. Mas suas "obras" incluem tudo o que estudamos nesta série: a corrupção dos Vigilantes, a geração dos Nefilim, a acusação no tribunal divino, a dominação através dos *sarim*, a estruturação dos sistemas mundanos de opressão.

Jesus veio para "desfazer" (*lysē*) cada uma dessas obras:
- O pecado: cancelado no *cheirographon* (Cl 2:14)
- A morte: aniquilada em seu poder (Hb 2:14)
- A acusação: silenciada (Ap 12:10)
- A escravidão: quebrada (Hb 2:15)
- A idolatria: exposta como adoração a demônios (1 Co 10:20)
- A divisão das nações: revertida na Grande Comissão (Mt 28:19-20)

A **Tipologia 7 (Histórica)** revela o padrão: o que o diabo fez progressivamente (Gênesis → Hermon → Babel → tribunal celestial), Cristo desfez definitivamente na cruz. A história da redenção é a história do desfazimento das obras do diabo.

### 4.3 A Descida ao Sheol e a Libertação dos Justos

Efésios 4:8-10 e 1 Pedro 3:18-20 descrevem um evento que a teologia cristã chama de "descida ao Sheol" ou "descida ao hades" — Cristo, entre sua morte e ressurreição, desceu ao mundo dos mortos para proclamar vitória e libertar os justos.

Efésios 4:8-10 cita o Salmo 68:18:

*"Subindo ao alto, levou cativo o cativeiro, e deu dons aos homens. Ora, isto — ele subiu — que é, senão que também antes tinha descido às partes mais baixas da terra? Aquele que desceu é também o mesmo que subiu acima de todos os céus, para cumprir todas as coisas."*

"Levou cativo o cativeiro" é uma imagem militar: um conquistador retornando de uma campanha vitoriosa, trazendo os prisioneiros que libertou do inimigo. Cristo desceu ao Sheol e libertou os justos que aguardavam a redenção — Abraão, Isaque, Jacó, Davi e todos os que morreram na fé antes da cruz.

1 Pedro 3:18-20 acrescenta:

*"Porque também Cristo padeceu uma vez pelos pecados, o justo pelos injustos, para levar-nos a Deus; mortificado, na verdade, na carne, mas vivificado pelo Espírito; no qual também foi, e pregou aos espíritos em prisão; os quais noutro tempo foram rebeldes, quando a longanimidade de Deus esperava nos dias de Noé..."*

Esta pregação aos "espíritos em prisão" — os Vigilantes do Tártaro (Volume 3) — não foi um oferecimento de salvação, mas uma **proclamação de vitória**. O Enoque de 1 Enoque 12-16 foi enviado aos Vigilantes para anunciar sua sentença; agora, o Filho de Deus encarnado desce pessoalmente para declarar que a sentença está em execução e que sua vitória foi consumada.

A descida ao Sheol foi a **invasão da fortaleza do inimigo**. O diabo tinha o "império da morte", e Cristo invadiu seu território, libertou os cativos e emergiu vitorioso na ressurreição. O Sheol foi saqueado. A morte foi vencida em seu próprio domínio.

