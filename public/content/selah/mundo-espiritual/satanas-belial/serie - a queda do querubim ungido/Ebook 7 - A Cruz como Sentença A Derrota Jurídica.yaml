## Introdução: O Tribunal no Calvário — Quando a Execução se Tornou Sentença

Há momentos na história do cosmos em que a aparência e a realidade se invertem radicalmente. A cruz de Jesus Cristo é o maior desses momentos. Aos olhos humanos, era uma execução brutal — um pregador itinerante da Galileia sendo condenado pelo Império Romano, abandonado por seus discípulos, zombado pelas multidões. Aos olhos humanos, era o triunfo do sistema religioso corrupto e do poder imperial.

Mas nos lugares celestiais, algo completamente diferente estava acontecendo.

Enquanto os soldados romanos lançavam sortes sobre as vestes de Jesus, o tribunal divino estava em sessão. Enquanto o sangue escorria dos pulsos e pés pregados no madeiro, um decreto estava sendo cancelado. Enquanto Jesus bradava "Está consumado", os principados e potestades estavam sendo despidos de sua autoridade. A cruz não foi um martírio que Deus reverteu na ressurreição; a cruz **em si mesma** foi o ato jurídico que desmantelou o poder do adversário.

Este volume é a investigação dessa vitória forense. Vamos analisar os textos mais densos do Novo Testamento sobre a derrota do diabo: Colossenses 2:13-15, Hebreus 2:14-15, Romanos 3:24-25, 1 João 3:8 e Apocalipse 12:10-11. Descobriremos que a linguagem usada por Paulo, pelo autor de Hebreus e por João não é poética; é **técnica**. Cada metáfora — o decreto cravado, o despojamento, o propiciatório, a expulsão do acusador — corresponde a uma realidade jurídica precisa dentro do tribunal divino.

Aplicaremos as 7 Regras de Hilel com o rigor de sempre. A *gezerah shavah* conectará o *cheirographon* de Colossenses com as acusações de Zacarias 3. O *kal va-chomer* do sangue de Cristo versus o sangue de animais (Hebreus 9:13-14) será explorado em toda sua força. A *binyan av* extrairá de múltiplos textos o princípio-pai: a cruz é tribunal, a ressurreição é veredito.

A literatura do Segundo Templo iluminará as categorias jurídicas que o Novo Testamento pressupõe. 1 Enoque 10 descreve a sentença sobre os Vigilantes; o Novo Testamento mostra sua execução parcial na cruz. 11QMelchizedek descreve o Melquisedeque celestial executando o juízo; o Novo Testamento o identifica como Cristo. Os Testamentos dos Doze Patriarcas e Jubileus fornecem o vocabulário da derrota de Belial que Paulo e João utilizam.

Prepare-se para a sala do tribunal. O réu que foi executado no Calvário era, na verdade, o Juiz que executava a sentença contra o acusador.

