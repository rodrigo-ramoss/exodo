## Capítulo 2 — Semihazah e Azazel: Os Líderes da Transgressão

### 2.1 O Juramento no Monte Hermon

1 Enoque 6-7 fornece os nomes, números e detalhes que Gênesis 6 omite. O Livro dos Vigilantes, datado do século III a.C., é a fonte mais antiga e completa sobre a segunda rebelião:

*"E aconteceu que, quando os filhos dos homens se multiplicaram, naqueles dias nasceram-lhes filhas formosas e belas. E os anjos, filhos do céu, viram-nas, desejaram-nas, e falaram entre si: 'Vinde, tomemos para nós mulheres dentre as filhas dos homens, e geremos para nós filhos.'"* (1 Enoque 6:1-2)

O líder da conspiração era **Semihazah** (שמיחזה — "meu nome viu" ou "o nome viu"). Ele é descrito como o chefe supremo (*archon*) dos duzentos. Mas Semihazah temia agir sozinho. 1 Enoque 6:3-5 registra seu apelo aos companheiros:

*"E Semihazah, que era o seu chefe, disse-lhes: 'Temo que vós não queirais fazer isso, e que eu sozinho sofra a pena de um grande pecado.' E todos lhe responderam e disseram: 'Façamos todos um juramento, e atemo-nos todos a uma maldição para não abandonarmos esse plano até executá-lo.'"*

O juramento foi feito no **Monte Hermon** (har chermon — derivado de *cherem*, "anátema, maldição"). O lugar recebeu seu nome por causa do juramento de maldição que ali fizeram. O Hermon, na fronteira norte de Israel, era um pico majestoso (2814 metros) associado a cultos pagãos (Baal-Hermon, Jz 3:3; Sl 133:3; Ct 4:8). É poeticamente terrível que o local do juramento dos anjos rebeldes tenha se tornado, mais tarde, um centro de idolatria cananeia.

1 Enoque 6:7-8 lista os vinte chefes principais: Semihazah, Urakib, Akibeel, Tamiel, Ramuel, Danel, Ezequel, Baraquiel, Asael, Armaros, Batriel, Ananel, Zaquiel, Samsiel, Sartael, Turiel, Yomiel, Araziel, e Azazel. Este último, **Azazel** (עזאזל — "força de Deus" ou "aquele que se afasta de Deus"), é destacado como décimo terceiro — número de rebelião e apostasia — e será o mais mencionado nas seções seguintes.

O número duzentos não é aleatório. Na simbologia numérica do Antigo Oriente Próximo, representa uma força militar organizada. Os Vigilantes estavam se constituindo como um **exército rebelde com estrutura de comando formal**. Não era um deslize moral impulsivo; era uma campanha deliberada com hierarquia e juramento.

A **Regra 3 de Hilel** (*binyan av mi-katuv echad* — princípio-pai de um texto) opera a partir de 1 Enoque. O princípio que emerge é: **toda rebelião começa com medo do isolamento e se consolida em juramento coletivo**. Semihazah não quis agir sozinho; ele formou uma aliança. A rebelião contra Deus é sempre comunitária em sua execução — uma paródia da aliança divina.

### 2.2 Azazel e o Conhecimento Proibido

Enquanto Semihazah é o líder militar da descida, **Azazel** é o líder da corrupção cultural. 1 Enoque 8:1-3 descreve os conhecimentos que os Vigilantes ensinaram à humanidade:

*"E Azazel ensinou aos homens a fabricar espadas, facas, escudos, couraças, e mostrou-lhes metais e a arte de trabalhá-los... E houve grande impiedade e fornicação, e eles se corromperam em todos os seus caminhos."*

A lista de conhecimentos proibidos inclui: metalurgia bélica (armas e armaduras), cosmética (maquiagem, tinturas, adornos), astrologia esotérica (observação das estrelas para fins divinatórios), e feitiçaria. O que parece ser "progresso civilizatório" em 1 Enoque é, na verdade, **tecnologia caída** — conhecimento angelical transmitido prematuramente a uma humanidade sem maturidade moral para usá-lo.

Há uma correspondência estrutural com Gênesis 4:19-22, onde os descendentes de Caim desenvolvem a metalurgia, a música e a pecuária. Na teologia de 1 Enoque, o que Gênesis 4 atribui a Caim, 1 Enoque atribui também a Azazel. As duas tradições convergem: a tecnologia foi desenvolvida por linhagens ou agentes rebeldes, não como presente abençoado de Deus.

O nome **Azazel** aparece em Levítico 16 no ritual do Dia da Expiação. Dois bodes são apresentados: um é sacrificado a Yahweh; o outro é o bode "para Azazel" (*la-azazel*). Sobre este, o sumo sacerdote impõe as mãos, confessa os pecados de Israel e o envia ao deserto — um "lugar árido" (*erets gezerah*). A tradição rabínica antiga e 1 Enoque identificam Azazel como o líder dos anjos caídos. O ritual do Yom Kippur é, simbolicamente, a devolução dos pecados ao seu autor original — o anjo rebelde — enquanto o sangue do bode sacrificado faz expiação.

A **Tipologia 6 (Ritual)** opera em toda sua força aqui. O bode expiatório do Yom Kippur é tipo de Cristo que carregou os pecados, mas também anti-tipo de Azazel, aquele a quem o pecado pertence por origem. O deserto para onde o bode era enviado representa o lugar árido, a esfera de afastamento de Deus (cf. Mt 12:43 — os demônios andam "por lugares áridos"). A cruz de Cristo cumpre ambos os aspectos: como bode sacrificado, derrama sangue; como vitorioso, envia o pecado de volta ao autor e o condena ao lugar árido.

A **Regra 2 de Hilel** (*gezerah shavah*) conecta o Azazel de 1 Enoque com o Azazel de Levítico 16 pela palavra compartilhada. A tradição judaica pré-cristã já fazia essa identificação; o Dia da Expiação era, entre outras coisas, uma liturgia de guerra contra o líder da segunda rebelião.

### 2.3 A Gezerah Shavah entre 1 Enoque e o Novo Testamento

A conexão mais forte entre 1 Enoque e o cristianismo apostólico está em Judas 14-15, que cita **nominalmente** 1 Enoque 1:9 como profecia. Mas as alusões são muito mais numerosas:

- **1 Pedro 3:19-20** — Cristo pregando aos espíritos em prisão nos dias de Noé → 1 Enoque 12-16 (Enoque enviado aos Vigilantes prisioneiros para anunciar a sentença).
- **2 Pedro 2:4** — "Deus não poupou aos anjos que pecaram" → 1 Enoque 10 (sentença dos Vigilantes).
- **Apocalipse 20:1-3** — o anjo que prende Satanás no abismo → 1 Enoque 10:4-6 (Rafael amarrando Azazel no deserto).
- **Mateus 24:37** — "Como nos dias de Noé, assim será a vinda do Filho do homem" → 1 Enoque 6-11 (os dias de Noé como evento de corrupção angelical).

A **Regra 4 de Hilel** (*binyan av mi-shnei ketuvim*) opera com força máxima: 1 Enoque e o Novo Testamento são dois testemunhos convergentes que estabelecem o princípio-pai de que **anjos caíram, violaram ordens criacionais e foram julgados**. Negar essa estrutura é ignorar o fundamento sobre o qual Judas, Pedro e o autor de Hebreus construíram sua teologia.

