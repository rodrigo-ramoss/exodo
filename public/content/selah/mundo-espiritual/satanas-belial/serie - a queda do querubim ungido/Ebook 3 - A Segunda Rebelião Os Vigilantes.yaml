## Ponte para o Volume 4: Os Nefilim e a Origem dos Demônios

Os Vigilantes estão presos no Tártaro. Os Nefilim morreram no dilúvio. Mas os espíritos dos Nefilim — para onde foram? A resposta de 1 Enoque 15 é uma das revelações mais importantes para a angelologia bíblica: os demônios são os espíritos dos gigantes mortos, espíritos desencarnados que vagueiam pela terra buscando corpos para habitar.

No próximo volume, vamos explorar essa verdade perturbadora. Examinaremos 1 Enoque 15:8-16:1, Jubileus 10, os relatos de exorcismo nos Evangelhos e a angustiante pergunta dos demônios: "Vieste aqui atormentar-nos antes do tempo?" (Mt 8:29). Entenderemos por que eles buscam lugares áridos, por que clamam por corpos, e por que o ministério de libertação de Jesus é a demonstração suprema de que o reino de Deus chegou.

Prepare-se para enfrentar a Legião.

