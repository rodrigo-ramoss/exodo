## Capítulo 2 — O Adversário no Antigo Testamento e no Período Intertestamentário

### 2.1 A Evolução do Retrato do Inimigo nas Escrituras

Uma das acusações mais comuns contra a demonologia do Novo Testamento é que ela seria um desenvolvimento tardio, influenciado pelo dualismo persa durante o exílio babilônico. Os críticos argumentam que o Antigo Testamento não tem uma figura unificada de Satanás, e que o "Diabo" seria uma invenção do judaísmo pós-exílico.

A acusação é compreensível, mas incorreta. A revelação bíblica é **progressiva**, não contraditória. Deus revelou a identidade do adversário gradualmente, por razões pedagógicas. Em um ambiente politeísta onde Israel era constantemente tentado a adorar outros deuses, a revelação prematura de um "príncipe das trevas" poderoso poderia levar o povo a adorá-lo como uma divindade rival. Era necessário primeiro estabelecer a unicidade absoluta de Yahweh antes de revelar a existência de um adversário cósmico.

O Antigo Testamento fornece **sementes** que o Novo Testamento e a literatura do Segundo Templo **desenvolvem**:

**Gênesis 3:** A serpente é apresentada como uma criatura astuta, mas sua identidade última não é explicitada. No entanto, a maldição de Gênesis 3:15 ("esta te ferirá a cabeça") já estabelece uma inimizade cósmica que transcende um mero animal.

**Jó 1-2:** *Ha-Satan* aparece como membro do conselho divino com função de acusador. Ele não é onipotente nem onisciente; opera sob permissão e com limites. Mas sua malevolência é evidente.

**Zacarias 3:** O acusador é repreendido pelo Anjo do Senhor. A cena prefigura a expulsão definitiva de Apocalipse 12.

**1 Crônicas 21:1:** "Então Satanás se levantou contra Israel, e incitou Davi a numerar Israel." Compare com 2 Samuel 24:1, onde é a "ira do Senhor" que incita Davi. O cronista, escrevendo depois do exílio, tem uma demonologia mais explícita que o autor de Samuel. A diferença não é contradição, mas **revelação progressiva**: o agente secundário (Satanás) é nomeado explicitamente na narrativa posterior.

**Isaías 14 e Ezequiel 28:** Como estudamos no Volume 1, esses oráculos contra os reis da Babilônia e Tiro transcendem seus alvos humanos e descrevem a queda de um ser celestial. A linguagem é poética, mas a realidade descrita é cósmica.

A revelação não foi concluída no Antigo Testamento. Era necessário o evento Cristo — sua encarnação, tentação, crucificação e ressurreição — para que a identidade do adversário fosse plenamente exposta. "Para isto o Filho de Deus se manifestou: para desfazer as obras do diabo" (1 Jo 3:8). A derrota do inimigo revelou sua identidade.

### 2.2 Os Testamentos dos Doze Patriarcas e a Expectativa do Messias Guerreiro

O período intertestamentário (aproximadamente 400 a.C. a 50 d.C.) foi o caldeirão onde a expectativa messiânica e a demonologia se fundiram. Os Testamentos dos Doze Patriarcas, uma coleção de discursos éticos e apocalípticos atribuídos aos filhos de Jacó, são uma janela para essa fusão.

O Testamento de Levi 18:12 declara:

*"E Beliar será amarrado por ele [o Messias], e dará poder a seus filhos de pisar os espíritos maus."*

Aqui, Belial (grafado como Beliar nos Testamentos) é identificado como o arqui-inimigo que o Messias derrotará. A linguagem de "pisar" ecoa Gênesis 3:15 e antecipa Romanos 16:20.

O Testamento de Judá 25:3 profetiza:

*"E haverá um só povo do Senhor, com uma só língua; e não haverá mais o espírito de erro de Beliar, porque será lançado no fogo para sempre."*

A profecia ecoa Babel (uma só língua) e antecipa Apocalipse 20:10 (lançado no fogo para sempre). Belial é apresentado como o "espírito de erro" — o mesmo título que 1 João 4:6 usará para o anticristo.

O Testamento de Daniel 5:10-11 é particularmente importante para a teologia paulina:

*"Afastai-vos da ira, e odiai a mentira, para que o Senhor habite entre vós, e Beliar fuja de vós. Aprendei a bondade, e não olheis para o mal, porque o Altíssimo ouvirá os vossos clamores."*

A ordem "Beliar fugirá de vós" é virtualmente citada por Tiago 4:7: "Resisti ao diabo, e ele fugirá de vós." A dependência literária e conceitual é inegável.

Estes textos mostram que, no ambiente do Segundo Templo, a expectativa messiânica incluía necessariamente a derrota de Belial. O Messias não seria apenas um rei humano; seria o guerreiro divino que esmagaria a cabeça da serpente.

### 2.3 A Fusão Escatológica no Apocalipse de Abraão

O Apocalipse de Abraão, uma obra apocalíptica do final do século I d.C. que reflete tradições muito mais antigas, oferece uma das fusões mais explícitas das figuras adversariais. No capítulo 13, Abraão pergunta a Deus sobre o mal no mundo, e Deus responde identificando Azazel como o tentador do Éden:

*"E o Senhor disse: 'Abraão, esta é a tua herança... E o homem [Adão] estava com ela [Eva], e Azazel o enganou. E a sua queda foi grande.'"* (Apocalipse de Abraão 23)

No capítulo 14, Azazel é descrito como um ser que "reina sobre os segredos do abismo" e é chamado de "pai da mentira" — título que Jesus usará para o Diabo em João 8:44.

No capítulo 31, a visão escatológica mostra Azazel sendo julgado:

*"E ele [o Eleito] enviará Azazel ao fogo do Hades, e ele queimará para sempre."*

A fusão é completa: Azazel é a serpente do Éden, o governante do abismo, o pai da mentira, e seu destino é o fogo eterno. O Apocalipse de Abraão demonstra que, no ambiente do Novo Testamento, as figuras de Gadreel/Azazel/Satanás/Belial já eram tratadas como um único arqui-inimigo cósmico.

