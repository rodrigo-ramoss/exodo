## Capítulo 1 — A Convergência das Figuras Adversariais

### 1.1 Gadreel, Azazel, Mastema, Satanás: Muitos Nomes, Um Inimigo

Antes de prosseguirmos, recapitularemos a essência de cada figura principal que emergiu em nossa investigação. A coesão teológica do Novo Testamento depende da compreensão de que o Diabo e Satanás mencionados por Jesus e pelos apóstolos são a culminação dessa tradição revelada, e não uma inovação tardia.

**Gadreel (גדריאל): A Serpente do Éden.**
Mencionado em 1 Enoque 69:6 como o anjo que "desencaminhou Eva". Seu nome deriva provavelmente de *gader* (cerca, muro) e *El* (Deus) — "Deus é minha cerca", ironicamente o guardião do santuário que se tornou o invasor. Gadreel representa a **origem** do mal na história da humanidade. Ele não é apenas um tentador; é o **homicida desde o princípio** (Jo 8:44). Sua função primordial era guardar a santidade do Éden, mas ele a profanou ao seduzir a mulher. O Novo Testamento o identifica explicitamente como "a antiga serpente" (Ap 12:9; 20:2), retroativamente conectando a narrativa de Gênesis 3 à figura que Jesus enfrentou e derrotou.

**Azazel (עזאזל): O Corruptor da Civilização.**
Em 1 Enoque 8, Azazel é o Vigilante específico que ensinou à humanidade a metalurgia bélica e a feitiçaria. Diferente de Gadreel, cujo pecado foi a sedução, Azazel corrompeu o conhecimento. Ele é associado ao deserto e ao lugar árido para onde o bode expiatório era enviado em Levítico 16. Sua influência representa a **dimensão cultural e tecnológica** da rebelião — o uso do conhecimento para a violência e a idolatria. A tradição rabínica (Talmude Babilônico, Yoma 67b) e o livro de Enoque concordam que Azazel se tornou um nome sinônimo do poder demoníaco no deserto.

**Mastema (משטמה): O Comandante dos Espíritos Imundos.**
Em Jubileus 10, Mastema é o líder que negocia com Deus a permissão para reter um décimo dos espíritos dos Nefilim sob seu comando. Seu nome deriva de *satan* (adversar, acusar) e carrega o sentido de "hostilidade" ou "inimizade". Curiosamente, a raiz hebraica *stm* também ecoa a inimizade (*eivah*) de Gênesis 3:15. Enquanto Gadreel iniciou a guerra no Éden e Azazel a ampliou culturalmente, Mastema é o **general** dessa guerra na era pós-diluviana. Ele opera com permissão e limites precisos — 10% dos espíritos, sob seu comando, até o dia do juízo.

**Satanás (Σατανᾶς): O Acusador Judicial.**
Como estudamos no Volume 2, *Ha-Satan* é o título funcional do adversário no tribunal celestial. Em Jó 1-2 e Zacarias 3, ele é o promotor que acusa os servos de Deus diante do trono. A Septuaginta traduz *Ha-Satan* como *ho diabolos* (διάβολος), o "caluniador" ou "difamador". Enquanto Gadreel corrompeu a mulher e Azazel corrompeu a cultura, Satanás corrompeu o **processo judicial** — ele usa a própria Lei de Deus como arma para exigir a condenação. Apocalipse 12:10 o chama de "o acusador de nossos irmãos, que os acusava de dia e de noite diante do nosso Deus".

**Como esses nomes convergem?**
Os textos de Qumran e os Apócrifos já tratavam essas figuras como manifestações de uma única força maligna. A Doutrina dos Dois Espíritos (1QS 3-4) unifica todos os poderes da "perversidade" sob o governo de um **Anjo das Trevas** (*Mal'akh Choshek*), também chamado de **Belial**. O Rolo da Guerra (1QM) descreve a batalha escatológica dos "filhos da luz" contra o "exército de Belial", que inclui tanto os anjos caídos quanto os "filhos das trevas" humanos. O Apocalipse de Abraão identifica Azazel como aquele que tentou Eva, o acusador e o governante deste mundo — fundindo todas as funções em uma só entidade.

O Novo Testamento completa essa convergência. Jesus chama o adversário de "o Diabo" (caluniador), "Satanás" (adversário) e "o príncipe deste mundo" (Jo 12:31). Paulo usa "Satanás" (Rm 16:20), "Belial" (2 Co 6:15) e "o deus deste século" (2 Co 4:4). João, no Apocalipse, fornece a fusão definitiva: "o grande dragão, a antiga serpente, chamada o Diabo e Satanás, que engana todo o mundo" (Ap 12:9).

### 1.2 Belial na Literatura de Qumran: O Príncipe das Trevas

A comunidade de Qumran fornece a articulação mais explícita da identidade de Belial como arqui-inimigo cósmico antes do Novo Testamento. A palavra hebraica *Belial* (בליעל) significa literalmente "sem valor" ou "inútil" — *beli* (sem) + *ya'al* (proveito). No Antigo Testamento, é frequentemente traduzida como "homens de Belial" (homens ímpios, perversos). Mas em Qumran, o termo se torna um **nome próprio**: a personificação do mal.

O Documento de Damasco (CD 4:12-19) descreve as "três redes de Belial" que capturam Israel: a fornicação, a riqueza e a profanação do santuário. Observe a estratégia: Belial ataca a pureza sexual (a semente), a economia (o poder material) e a adoração (a relação com Deus). Essas três redes são o inverso exato das três virtudes teologais (fé, esperança e amor). Belial é metódico.

A Regra da Comunidade (1QS 2:4-10) pronuncia uma maldição sobre "o lote de Belial", incluindo a fórmula: "Maldito sejas tu no domínio de Belial, em teu espírito iníquo! Maldito sejas tu no reino de Belial, em todas as tuas obras de impureza!" O dualismo é radical: há o "lote de Deus" e o "lote de Belial", e toda a humanidade está dividida entre esses dois lotes.

O Rolo da Guerra (1QM 13:1-6) é o texto mais poderoso. Na batalha escatológica, os sacerdotes tocarão as trombetas e proclamarão: "Bendito seja o Deus de Israel e maldito seja Belial... Amaldiçoado és tu, Belial, no domínio da tua hostilidade! Amaldiçoados são todos os espíritos do teu lote nos desígnios de tua impureza!"

Esta é a linguagem que Paulo herda. Quando ele escreve "que concórdia há entre Cristo e Belial?" (2 Co 6:15), está citando diretamente o vocabulário qumranita. Seus leitores em Corinto — uma igreja com forte influência judaica — entenderam perfeitamente a referência.

A **Tipologia 7 (Histórica)** opera aqui: o padrão de nomear o adversário se repete e se unifica. O que era múltiplo nos tempos antigos (Gadreel, Azazel, Mastema) se torna um só nos tempos escatológicos (Belial). A convergência dos nomes é um sinal de que a história está chegando ao seu clímax.

### 1.3 A Gezerah Shavah que Conecta os Títulos

Aplicando a **Regra 2 de Hilel** (*gezerah shavah*), podemos rastrear palavras e conceitos compartilhados que conectam as diferentes figuras adversariais:

**"Serpente" (*nachash*)**: Gênesis 3:1 → Apocalipse 12:9; 20:2. A serpente do Éden é explicitamente identificada como o Diabo e Satanás. A palavra funciona como ponte hermenêutica que autoriza a leitura unificada.

**"Acusar" (*satan*, *diaballō*)**: Jó 1-2 e Zacarias 3 (hebraico *satan*) → Apocalipse 12:10 (grego *katēgorōn*). A função de acusador no tribunal celestial é a mesma, esteja o adversário operando sob o título de *Ha-Satan* no AT ou como "o acusador" expulso em Apocalipse.

**"Enganar" (*planaō*)**: 1 Enoque 6 (os Vigilantes enganam as mulheres) → 2 Coríntios 11:3 (a serpente enganou Eva) → Apocalipse 12:9 (o dragão "engana todo o mundo"). O engano é a estratégia primordial do adversário em todas as suas manifestações.

**"Filho(s) da perdição" (*ben/ben ha-avaddon*, *huios tēs apōleias*)**: 1QS 9:16 (os homens do lote de Belial como "filhos da perdição") → João 17:12 (Judas como "filho da perdição") → 2 Tessalonicenses 2:3 (o Anticristo como "o filho da perdição"). A linguagem qumranita é adotada por Jesus e Paulo.

**"Abismo" (*abyssos*, *tehom*)**: 1 Enoque 10:4-6 (Azazel lançado no abismo/deserto) → Lucas 8:31 (os demônios suplicam para não serem lançados no abismo) → Apocalipse 20:1-3 (Satanás lançado no abismo). O mesmo destino é compartilhado por Azazel e Satanás.

A convergência de todas essas *gezerah shavah* estabelece, com segurança hermenêutica, que a tradição bíblica e parabíblica trata as figuras adversariais como manifestações do mesmo arqui-inimigo. A **Regra 4 de Hilel** (*binyan av mi-shnei ketuvim*) confirma o princípio-pai: múltiplos testemunhos (1 Enoque, Qumran, Evangelhos, Paulo, Apocalipse) convergem para a unidade do adversário.

