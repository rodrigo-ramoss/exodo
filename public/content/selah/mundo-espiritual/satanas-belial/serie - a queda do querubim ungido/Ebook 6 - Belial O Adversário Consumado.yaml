## Capítulo 4 — Cristo versus Belial: O Dualismo Escatológico de Paulo

### 4.1 A Menção Explícita em 2 Coríntios 6

Paulo é o único autor neotestamentário a usar explicitamente o nome "Belial". Em 2 Coríntios 6:14-15, ele escreve:

*"Não vos prendais a um jugo desigual com os incrédulos; pois que sociedade tem a justiça com a injustiça? E que comunhão tem a luz com as trevas? E que concórdia há entre Cristo e Belial? Ou que parte tem o crente com o incrédulo?"*

A série de contrastes é construída em quiasmo:
- Justiça vs. Injustiça
- Luz vs. Trevas
- **Cristo vs. Belial**
- Crente vs. Incrédulo

O contraste central é cristológico. Paulo está citando literalmente o vocabulário dualista de Qumran, onde a guerra entre o Príncipe da Luz e Belial define a estrutura do cosmos. Ao colocar Cristo como o oposto de Belial, Paulo está fazendo uma declaração cristológica suprema: Jesus é o Príncipe da Luz, o comandante das forças da verdade, a antítese absoluta do adversário.

A pergunta retórica "que concórdia há entre Cristo e Belial?" (*tis de symphōnēsis Christō pros Belial?*) usa a palavra *symphōnēsis* — acordo, harmonia, sinfonia. Não há sinfonia possível entre o Messias e o anti-Messias; não há coexistência pacífica. A guerra é total.

Este dualismo não é ontológico (Bem e Mal como princípios eternos equivalentes), mas **escatológico**. Deus criou Belial como um ser bom que se corrompeu; sua derrota é certa. 1 João 3:8 declara: "Para isto o Filho de Deus se manifestou: para desfazer as obras do diabo." A missão de Cristo é, literalmente, desfazer o que Belial fez.

### 4.2 O Homem da Iniquidade em 2 Tessalonicenses 2

Em 2 Tessalonicenses 2, Paulo expande seu retrato do adversário ao descrever a manifestação final da rebelião satânica: o "homem da iniquidade" (*anthrōpos tēs anomias*), também chamado de "filho da perdição" (*huios tēs apōleias*).

*"Ninguém de maneira alguma vos engane; porque não será assim sem que antes venha a apostasia, e se manifeste o homem do pecado, o filho da perdição, o qual se opõe, e se levanta contra tudo o que se chama Deus, ou se adora; de sorte que se assentará, como Deus, no templo de Deus, querendo parecer Deus."* (2 Ts 2:3-4)

A linguagem evoca imediatamente a queda do querubim ungido (Volume 1). O "querer parecer Deus" é a tentação original — "Serei semelhante ao Altíssimo" (Is 14:14). O ato de assentar-se "no templo de Deus" é a profanação do Santuário, o mesmo crime de Ezequiel 28:18 ("profanaste o teu santuário"). O Anticristo é a encarnação humana do pecado original do querubim.

Paulo continua:

*"E então será revelado o iníquo, a quem o Senhor desfará pelo sopro da sua boca, e aniquilará pelo esplendor da sua vinda; a esse cuja vinda é segundo a eficácia de Satanás, com todo o poder, e sinais e prodígios de mentira, e com todo o engano da injustiça para os que perecem."* (2 Ts 2:8-10)

O Anticristo não opera com poder próprio; opera "segundo a eficácia de Satanás" (*kat' energeian tou Satana*). Satanás (Belial) é a fonte do poder do Anticristo. A estratégia de sinais e prodígios enganadores ecoa 1 Enoque 8, onde Azazel ensinou feitiçaria e encantamentos.

A **Tipologia 1 (Pessoal) Inversa** atinge seu ápice aqui. O Anticristo é o anti-tipo de Cristo em todas as dimensões:

| Cristo | Anticristo |
|--------|------------|
| Veio em nome do Pai (Jo 5:43) | Virá em seu próprio nome (Jo 5:43) |
| Desceu do céu (Jo 6:38) | Sobe do abismo (Ap 11:7) |
| Cheio do Espírito Santo (Lc 4:1) | Cheio de Satanás (2 Ts 2:9) |
| Humilhou-se até a morte (Fp 2:8) | Exalta-se até o trono (2 Ts 2:4) |
| Ressuscitou dentre os mortos (At 2:24) | Sofrerá ferida mortal e será curado (Ap 13:3) |
| Recebeu adoração como Deus (Jo 20:28) | Exigirá adoração como Deus (Ap 13:8) |

A tipologia inversa não é alegoria; é correspondência estrutural antitética. O Anticristo é o espelho distorcido de Cristo, assim como o querubim ungido era o espelho distorcido do verdadeiro Ungido.

### 4.3 A Linguagem Qumranita de Paulo e a Guerra dos Filhos da Luz

Paulo emprega o vocabulário de Qumran em Efésios 5:8 e 1 Tessalonicenses 5:5 com naturalidade, indicando que a distinção entre "filhos da luz" e "filhos das trevas" era familiar à igreja primitiva:

*"Porque noutro tempo éreis trevas, mas agora sois luz no Senhor; andai como filhos da luz."* (Ef 5:8)

*"Porque todos vós sois filhos da luz e filhos do dia; nós não somos da noite nem das trevas."* (1 Ts 5:5)

A terminologia é idêntica à de 1QM (Rolo da Guerra) e 1QS (Regra da Comunidade). Paulo não está importando um conceito estranho; está confirmando que a identidade cristã se define em oposição a Belial e seu lote. A conversão é uma transferência de cidadania: o crente é "liberto do poder das trevas e transportado para o reino do Filho do seu amor" (Cl 1:13).

