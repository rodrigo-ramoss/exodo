## Capítulo 4 — Abadom/Apoliom: O Rei-Anjo do Abismo e a Hierarquia Demoníaca

### 4.1 "Destruidor": Etimologia e Ofício

*"E tinham sobre si rei, o anjo do abismo; em hebreu era o seu nome Abadom, e em grego Apoliom."* (Ap 9:11)

A dupla nomeação — hebraico e grego — é uma chave hermenêutica que João deliberadamente fornece. O significado dos nomes revela a função do ser.

**Abadom** (אֲבַדּוֹן) significa "destruição, ruína, perdição". No Antigo Testamento, ocorre em paralelo com Sheol e Morte (Jó 26:6; 28:22; Sl 88:11; Pv 15:11). Não é inicialmente um nome pessoal, mas um **lugar ou princípio de destruição**. Em Jó 31:12, o fogo que "consome até Abadom" é o fogo do juízo total.

**Apoliom** (Ἀπολλύων) é o particípio presente ativo de *apollymi* — "destruir". Significa "o que está destruindo", "o destruidor ativo". A forma grega evoca intencionalmente o deus Apolo (Ἀπόλλων), divindade associada a pragas, morte súbita e — ironicamente — gafanhotos. Apolo era invocado como *parnopios* ("aquele que afasta os gafanhotos"). João subverte a referência: o deus pagão que supostamente protegia contra gafanhotos é, na verdade, o rei **dos** gafanhotos demoníacos.

A dupla nomeação indica **universalidade**: Abadom é reconhecido pelos judeus (hebraico), Apoliom pelos gentios (grego). O rei do abismo transcende barreiras culturais e religiosas.

O nome não é um nome próprio como "Miguel" ou "Gabriel". É um **título funcional**: "o destruidor". Isso indica que este ser ocupa um ofício específico na hierarquia demoníaca — o de **executor-chefe de juízos destrutivos**.

A **Regra 2 de Hilel** (*gezerah shavah*) conecta Abadom/Apoliom com o "anjo destruidor" do Antigo Testamento. Em Êxodo 12:23, o "destruidor" (*hamashchit*) passa pelo Egito na noite da Páscoa. Em 2 Samuel 24:16, o "anjo destruidor" (*hamal'akh hamashchit*) estende a mão contra Jerusalém, e Deus o detém. Em ambos os casos, o destruidor é um **agente de juízo comissionado por Deus**, e não um rebelde agindo por conta própria. Abadom/Apoliom é o herdeiro escatológico desse ofício: o destruidor do abismo, liberado para executar tormento sobre os adoradores da besta.

### 4.2 A Relação com Belial, Satanás e a Cúpula do Mal

Onde Abadom/Apoliom se encaixa na hierarquia demoníaca? A resposta exige distinguir camadas de autoridade no reino das trevas.

**Não é Satanás/Belial.** Em Apocalipse 12:9, Satanás é o dragão, a antiga serpente. Em Apocalipse 20:1-3, Satanás é **lançado** no abismo como prisioneiro. Em contraste, Abadom **reina** no abismo como autoridade designada. Satanás vai para o abismo como detento; Abadom está lá como diretor da prisão. São papéis distintos na hierarquia do mal.

**Não é Azazel.** Em 1 Enoque 10:4-6, Azazel é um dos líderes dos Vigilantes, amarrado no deserto de Dudael (Tártaro). Ele é um prisioneiro, não um rei. Sua jurisdição é o Tártaro, não o abismo.

**Possível identificação com o Anjo das Trevas de Qumran.** Em 1QS 3:20-21, o Anjo das Trevas (*Mal'akh Choshek*) governa os espíritos da perversidade. Em 1QM 13:11-12, Belial é o comandante supremo, mas tem subordinados para funções específicas. Abadom/Apoliom pode ser um desses subordinados — um **comandante regional** (o governador militar do abismo) sob a autoridade de Belial.

A estrutura hierárquica do mal, conforme a Biblioteca Mental do Mundo Espiritual e a convergência das fontes, pode ser esboçada assim:

| Nível | Título | Função | Referência |
|-------|--------|--------|------------|
| **Supremo** | Satanás / Belial / Dragão | Arqui-inimigo, comandante supremo | Ap 12:9; 20:2; 2 Co 6:15 |
| **Comandantes de Teatro** | Abadom/Apoliom (Abismo); *Sarim* (Nações) | Governadores de prisões e territórios | Ap 9:11; Dn 10:13, 20 |
| **Oficiais de Unidade** | Líderes dos Vigilantes (Semihazah, Azazel — aprisionados); Mastema | Comandantes de contingentes específicos | 1 En 6-8; Jub 10:8 |
| **Tropa de Choque** | Gafanhotos do Abismo; Espíritos Imundos Comuns (*daimonia*) | Soldados especializados e soldados genéricos | Ap 9:3-10; Mc 5:9-13 |

Abadom/Apoliom ocupa o segundo nível: **comandante de teatro de operações**. Ele não é o general supremo (Belial), mas o oficial encarregado de uma instalação militar específica — o abismo — e das unidades que ali estão aquarteladas. Quando a quinta trombeta soa, ele lidera pessoalmente a força de gafanhotos em sua missão de tormento.

A **Tipologia 1 (Pessoal) Inversa** opera com força aqui. Abadom é o anti-tipo de Cristo como Rei. Cristo é o Rei dos reis, cujo nome significa "Salvador" (Yeshua); Abadom é o rei dos gafanhotos, cujo nome significa "Destruidor". Cristo liberta do abismo (Lc 8:31-36); Abadom governa no abismo. Cristo reina sobre a vida eterna; Abadom reina sobre o tormento temporário. A paródia satânica replica cada atributo da realeza divina com uma contraparte distorcida.

Miguel, como arcanjo comandante das hostes fiéis (Ap 12:7; 1QM 17), é o paralelo celestial de Abadom. Ambos são comandantes de teatro. Miguel lidera os exércitos da luz; Abadom lidera as unidades do abismo. A guerra de Apocalipse 12, onde Miguel expulsa Satanás, é o prelúdio da liberação das forças de Abadom em Apocalipse 9. A hierarquia militar do céu e a hierarquia militar do abismo são simétricas — uma é a paródia da outra.

### 4.3 O Reino que Contrasta com Provérbios 30:27

*"E tinham sobre si rei, o anjo do abismo."* (Ap 9:11a)

A frase é um escândalo zoológico e teológico. Provérbios 30:27 declara: "Os gafanhotos não têm rei; e contudo todos saem, e em bandos se repartem." A ausência de um rei é justamente o que torna os gafanhotos literais tão impressionantes: organização sem hierarquia, eficiência sem comando central.

Os gafanhotos do abismo **têm rei**. Sua organização não é instintiva, mas hierárquica. Eles obedecem a uma cadeia de comando com disciplina militar. Isso prova que não são insetos gigantes nem uma praga natural sobrenaturalizada. São **soldados espirituais** sob um oficial.

Em Mateus 12:24-26, Jesus argumenta que "todo reino dividido contra si mesmo será assolado" e pergunta: "Se Satanás expulsa Satanás, está dividido contra si mesmo; como subsistirá o seu reino?" O argumento pressupõe que os demônios têm um príncipe (Belzebu/Satanás), mas não implica que cada unidade demoníaca tenha um "rei" distinto. Os gafanhotos, porém, têm um rei próprio — Abadom/Apoliom — que é subordinado ao comando supremo de Belial, mas exerce autoridade real sobre sua unidade.

A **Regra 6 de Hilel** (*ke-yotze bo mi-maqom acher*) conecta a organização militar dos gafanhotos com a organização dos exércitos celestiais em 1QM (Rolo da Guerra). Em Qumran, as forças do mal são descritas como exércitos organizados com hierarquia: "o exército de Belial" (1QM 1:1), "os espíritos do seu lote" (1QM 13:4). Os gafanhotos são um desses lotes — uma divisão militar dentro do exército de Belial — comandada por Abadom como seu oficial general.

